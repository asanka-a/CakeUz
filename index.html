        </div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        ${chip('All','')} ${chip('Ingredients','ingredient')} ${chip('Recipes','recipe')} ${chip('Orders','order')} ${chip('Quotations','quotation')} ${chip('Customers','customer')} ${chip('Trips','trip')}
      </div>
      <div id="log-body"></div>
      ${activityLog.length>0?`<div style="margin-top:10px;text-align:right"><button class="btn btn-sm btn-danger" onclick="if(confirm('Clear ALL log entries? This cannot be undone.')){activityLog.length=0;persistWrite('clearLog',{});renderActivityLog()}">Clear log</button></div>`:''}
    </div>`;
  renderActivityLogBody();
}
function renderActivityLogBody(){
  const el = document.getElementById('log-body'); if (!el) return;
  const typeColors = {add:'log-add',edit:'log-edit',delete:'log-delete',order:'log-order',shop:'log-shop'};
  const q = _logSearchQ.trim().toLowerCase();
  const filtered = activityLog.filter(l => {
    if (_logEntityFilter && l.entityType !== _logEntityFilter) return false;
    if (q) {
      const hay = ((l.action||'') + ' ' + (l.detail||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  const sorted = sortRows(filtered, _logSort.key, _logSort.dir, (l, col) => {
    switch (col) {
      case 'time':   return l.time || '';
      case 'action': return l.action || '';
      case 'type':   return l.entityType || l.type || '';
      default: return null;
    }
  });
  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching log entries.</div>';
    return;
  }
  el.innerHTML = sorted.map(l => `
    <div class="log-entry">
      <div class="log-dot ${typeColors[l.type]||'log-edit'}"></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="log-action">${esc(l.action)}</span>
          <span class="log-time">${esc(l.time)}</span>
        </div>
        <div class="log-detail">${esc(l.detail)}</div>
        ${l.fieldChanges ? renderFieldChanges(l.fieldChanges) : ''}
      </div>
    </div>`).join('');
}
function renderFieldChanges(fc){
  if (!fc || typeof fc !== 'object') return '';
  const rows = Object.entries(fc).map(([k, v]) => {
    const oldV = v && typeof v === 'object' ? v.old : '';
    const newV = v && typeof v === 'object' ? v.new : '';
    return `<tr><td style="padding:1px 6px 1px 0;color:var(--text-muted)">${esc(k)}</td><td style="padding:1px 6px;text-decoration:line-through;color:var(--danger)">${esc(String(oldV))}</td><td>→</td><td style="padding:1px 0 1px 6px;color:var(--success)">${esc(String(newV))}</td></tr>`;
  }).join('');
  return `<table style="font-size:11px;margin-top:4px"><tbody>${rows}</tbody></table>`;
}

  const typeColors = {add:'log-add',edit:'log-edit',delete:'log-delete',order:'log-order',shop:'log-shop'};
  const body = entries.length === 0
    ? '<div class="empty-state">No history recorded for this item yet.</div>'
    : entries.map(l => `
        <div class="log-entry">
          <div class="log-dot ${typeColors[l.type]||'log-edit'}"></div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span class="log-action">${esc(l.action)}</span>
              <span class="log-time">${esc(l.time)}</span>
            </div>
            <div class="log-detail">${esc(l.detail)}</div>
            ${l.fieldChanges ? renderFieldChanges(l.fieldChanges) : ''}
          </div>

}

// Modal with dirty-guard: clicking outside or Esc only closes if no input was typed.
let _modalDirty = false;
function showModal(html, opts){
  _modalDirty = false;
  const cls = 'modal' + (opts && opts.wide ? ' wide' : '');
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)tryCloseModal()"><div class="${cls}" oninput="_modalDirty=true" onchange="_modalDirty=true">${html}</div></div>`;
}
function closeModal(){
  _modalDirty = false;
  document.getElementById('modal-root').innerHTML = '';
}
function tryCloseModal(){
  if (_modalDirty && !confirm('Discard unsaved changes?')) return;
  closeModal();
}
// Esc key also goes through the dirty guard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.querySelector('.modal-overlay')) tryCloseModal();
});

async function saveIngredient(){
  const name=document.getElementById('m-name').value.trim(); if(!name) return alert('Please enter a name.');
  const stock=parseFloat(document.getElementById('m-stock').value)||0;
  const price=parseFloat(document.getElementById('m-price').value)||0;
  const unit=document.getElementById('m-unit').value;
  if (stock <= 0) return alert('Quantity must be greater than 0.');
  const cost = price > 0 ? price / stock : 0;
  const id=S.nextIngId++;
  S.ingredients.push({id,name,stock,unit,cost});
  S.priceHistory[id]=[{date:today(),cost}];
  logAction('add','Ingredient added',`${name} — ${stock} ${unit} for ${fmtMoney(price)} (${fmtMoney(cost)}/${unit})`,'ingredient',id);
  closeModal(); renderInventory();
  await persistWrite('addIngredient', {id, name, stock, unit, cost, date:today()}, activityLog[0]);

async function saveEditIngredient(id){
  const i=getIng(id);
  const oldCost=i.cost, oldStock=i.stock, oldName=i.name, oldUnit=i.unit;
  const newName = document.getElementById('m-name').value.trim();
  const newUnit = document.getElementById('m-unit').value;
  let newStock = parseFloat(document.getElementById('m-stock').value) || 0;
  let newCost = parseFloat(document.getElementById('m-cost').value) || 0;
  // Check for a new purchase entry
  const buyQty = parseFloat(document.getElementById('m-buyqty').value) || 0;
  const buyPrice = parseFloat(document.getElementById('m-buyprice').value) || 0;
  let priceChangedByPurchase = false;
  if (buyQty > 0 && buyPrice > 0) {
    newStock = (parseFloat(i.stock) || 0) + buyQty;
    newCost = buyPrice / buyQty;
    priceChangedByPurchase = true;
  }
  i.name = newName;
  i.unit = newUnit;
  i.stock = newStock;
  const priceChanged = newCost !== oldCost;
  if (priceChanged) {
    i.cost = newCost;
    if (!S.priceHistory[id]) S.priceHistory[id] = [];
    S.priceHistory[id].push({ date: today(), cost: newCost });
  }
  let detail = newName;
  if (newName !== oldName) detail += ` (was: ${oldName})`;
  if (priceChangedByPurchase) detail += ` — purchased ${buyQty} ${newUnit} for ${fmtMoney(buyPrice)} (${fmtMoney(newCost)}/${newUnit})`;
  else if (priceChanged) detail += ` — price: ${fmtMoney(oldCost)} → ${fmtMoney(newCost)}`;
  if (newStock !== oldStock && !priceChangedByPurchase) detail += ` — stock: ${oldStock} → ${newStock} ${newUnit}`;
  if (newUnit !== oldUnit) detail += ` — unit: ${oldUnit} → ${newUnit}`;
  const fc = diffFields(
    { name: oldName, stock: oldStock, unit: oldUnit, cost: oldCost },
    { name: newName, stock: newStock, unit: newUnit, cost: newCost }
  );
  logAction('edit','Ingredient updated', detail, 'ingredient', id, fc);
  closeModal(); renderInventory();
  await persistWrite('editIngredient', {id:i.id, name:i.name, stock:i.stock, unit:i.unit, cost:i.cost, priceChanged, date:today()}, activityLog[0]);
}
async function deleteIng(id){
  const i=getIng(id);
  if (!i) return;
  // Block delete if this ingredient is used by any recipe or appears in any shopping trip.
  // The FK is ON DELETE RESTRICT post-migration, so DB would reject anyway — front-load with a clear message.
  const usedByRecipes = S.recipes.filter(r => (r.ingredients||[]).some(ri => ri.ingId === id));
  let tripCount = 0;
  S.shoppingTrips.forEach(t => { if ((t.items||[]).some(it => it.ingId === id)) tripCount++; });
  if (usedByRecipes.length || tripCount) {
    const parts = [];
    if (usedByRecipes.length) parts.push(`${usedByRecipes.length} recipe(s): ${usedByRecipes.map(r=>r.name).join(', ')}`);
    if (tripCount) parts.push(`${tripCount} past shopping trip(s)`);
    alert(`Can't delete "${i.name}" — it's still referenced by ${parts.join(' and ')}.\n\nRemove it from those first, then try again.`);
    return;
  }
  logAction('delete','Ingredient deleted', i.name, 'ingredient', id);
  S.ingredients=S.ingredients.filter(x=>x.id!==id); renderInventory();
  await persistWrite('deleteIngredient', {id}, activityLog[0]);
}

    chartInstance=new Chart(ctx,{type:'line',data:{labels:hist.map(h=>fmtDate(h.date)),datasets:[{label:CURRENCY,data:hist.map(h=>h.cost),borderColor:'#F5A623',backgroundColor:'rgba(245,166,35,0.12)',tension:0.35,pointRadius:5,pointBackgroundColor:'#F5A623',borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>CURRENCY+' '+v.toFixed(2),font:{size:10},color:tickColor},grid:{color:gridColor}},x:{ticks:{font:{size:10},color:tickColor},grid:{color:gridColor}}}}});
  },80);
}

// B5: AI receipt scan — routes through the Supabase Edge Function `scan-receipt`
// which holds the Anthropic API key server-side. Falls back to a clear manual-entry
// message on any failure (auth, network, bad JSON, or upstream error).
async function scanWithAI(){
  if (!receiptB64) return;
  const btn = document.getElementById('ai-btn');
  const status = document.getElementById('ai-status');
  btn.disabled = true;
  status.innerHTML = `<span class="spinner"></span> Reading receipt...`;
  const ingredients = S.ingredients.map(i => ({ id: i.id, name: i.name, unit: i.unit }));
  try {
    const { data, error } = await sb.functions.invoke('scan-receipt', {
      body: {
        imageBase64: receiptB64,
        mediaType:   receiptMime || 'image/jpeg',
        ingredients
      }
    });
    if (error) throw new Error(error.message || String(error));
    if (data && data.error) throw new Error(data.error);
    const text  = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
    const items = JSON.parse(text.replace(/```json|```/g, '').trim());
    if (!Array.isArray(items) || items.length === 0) {
      status.innerHTML = '<span style="color:var(--warning)">Could not read receipt. Please enter details manually.</span>';
      btn.disabled = false;
      return;
    }
    document.getElementById('trip-rows').innerHTML = '';
    items.forEach(it => {
      const ing = getIng(it.ingId);
      const totalPrice = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
      addTripRow({ ingId: it.ingId, qty: it.qty, unit: ing ? ing.unit : 'kg', totalPrice });
    });
    status.innerHTML = `<span style="color:var(--success)">✓ Found ${items.length} item${items.length!==1?'s':''}. Review below.</span>`;
  } catch (err) {
    console.error('Receipt scan failed:', err);
    status.innerHTML = '<span style="color:var(--danger)">Could not read receipt. Please enter details manually.</span>';
  }
  btn.disabled = false;
}
async function saveTrip(){
  const date=document.getElementById('m-tdate').value,shop=document.getElementById('m-tshop').value;
  const rows=document.querySelectorAll('#trip-rows .ing-row');
  const items=[]; let total=0;
  let conversionError = null;
  rows.forEach(row=>{
    const ingSel=row.querySelector('.trip-ing');
    const qtyInp=row.querySelector('.trip-qty');
    const unitSel=row.querySelector('.trip-unit');
    const priceInp=row.querySelector('.trip-price');
    if(!ingSel||!qtyInp||!unitSel||!priceInp) return;
    const ingId=parseInt(ingSel.value);
    const qtyEntered=parseFloat(qtyInp.value)||0;
    const unitEntered=unitSel.value;
    const priceTotal=parseFloat(priceInp.value)||0;
    if (qtyEntered <= 0 || priceTotal <= 0) return;
    const ing=getIng(ingId);
    if(!ing) return;
    // Convert entered qty to ingredient's storage unit
    const qtyInStorage = convertUnit(qtyEntered, unitEntered, ing.unit);
    if (qtyInStorage === null || qtyInStorage <= 0) {
      conversionError = `Cannot convert ${qtyEntered} ${unitEntered} of ${ing.name} to its storage unit (${ing.unit}). Pick a compatible unit.`;
      return;
    }
    const unitPriceStorage = priceTotal / qtyInStorage;
    items.push({ ingId, qty: qtyInStorage, unitPrice: unitPriceStorage });
    total += priceTotal;
    if (unitPriceStorage > 0 && unitPriceStorage !== ing.cost) {
      ing.cost = unitPriceStorage;
      if (!S.priceHistory[ingId]) S.priceHistory[ingId] = [];
      const last = S.priceHistory[ingId].slice(-1)[0];
      if (!last || last.cost !== unitPriceStorage) S.priceHistory[ingId].push({ date, cost: unitPriceStorage });
    }
    ing.stock = parseFloat((parseFloat(ing.stock) + qtyInStorage).toFixed(3));
  });
  if (conversionError) { alert(conversionError); return; }
  if (items.length === 0) { alert('Add at least one item with qty and price > 0.'); return; }
  const tripId=S.nextTripId++;
  const receiptImg = receiptB64?`data:${receiptMime};base64,${receiptB64}`:null;
  S.shoppingTrips.push({id:tripId,date,shop,items,total,receiptImg});
  logAction('shop','Shopping trip saved',`${shop||'Unnamed shop'} — ${items.length} items, total ${fmtMoney(total)}`,'trip',tripId);
  closeModal(); renderShopping();
  await persistWrite('addShoppingTrip', {id:tripId, date, shop, total, items, receiptImg: receiptImg||''}, activityLog[0]);
}
async function deleteTrip(id){
  const t=S.shoppingTrips.find(x=>x.id===id);
  logAction('delete','Shopping trip deleted',t?`${fmtDate(t.date)} — ${t.shop}`:'','trip',id);
  S.shoppingTrips=S.shoppingTrips.filter(x=>x.id!==id); renderShopping();

}

// Compute before→after diff for audit log; returns null if nothing changed.
// Render a packaging[] or addons[] list as a short readable summary for the audit log.
function _summarizeListField(k, v) {
  if (!Array.isArray(v)) return v;
  if (v.length === 0) return '(none)';
  if (k === 'packaging') {
    return v.map(p => `${p.item || '?'} @ ${fmtMoney(p.price || 0)}`).join(', ');
  }
  if (k === 'addons') {
    return v.map(a => `${a.name || '?'} × ${a.qty || 0} (sell ${fmtMoney(a.price || 0)}, cost ${fmtMoney(a.cost || 0)})`).join(', ');
  }
  // Generic fallback for other list fields (e.g., tags is already pre-joined upstream)
  return v.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(', ');
}
// Deep equality good enough for the simple shapes we store (scalars + small jsonb arrays/objects)
function _deepEq(a, b) {
  if (a === b) return true;
  if (a == null || b == null) return a === b;
  if (typeof a !== typeof b) return false;
  if (typeof a !== 'object') return false;
  try { return JSON.stringify(a) === JSON.stringify(b); } catch { return false; }
}
function diffFields(before, after){
  const changes = {};
  for (const k in after) {
    const bv = before[k], av = after[k];
    if (!_deepEq(bv, av)) {
      changes[k] = {
        old: Array.isArray(bv) ? _summarizeListField(k, bv) : bv,
        new: Array.isArray(av) ? _summarizeListField(k, av) : av
      };
    }
  }
  return Object.keys(changes).length ? changes : null;
}

// Build a snapshot of recipe ingredients scaled by orderQty, in storage units.
// priorSnapshot (optional): an existing ingredientSnapshot from the row being edited.
// When present, we preserve the historical costPerUnit per ingredient so editing an
// old order (e.g., bumping qty) doesn't rewrite its cost at today's prices.
function buildOrderSnapshot(recipe, orderQty, priorSnapshot){
  const priorByIngId = {};
  if (Array.isArray(priorSnapshot)) {
    priorSnapshot.forEach(line => {
      if (line && line.ingId != null) priorByIngId[line.ingId] = line;
    });
  }
  const lines = (recipe.ingredients || []).map(ri => {
    const ing = getIng(ri.ingId);
    if (!ing) return null;
    const fromUnit = ri.unit || ing.unit;
    const totalEntered = ri.qty * orderQty;
    const qtyInStorage = convertUnit(totalEntered, fromUnit, ing.unit);
    const qtyOk = qtyInStorage !== null;
    const prior = priorByIngId[ri.ingId];
    const costPerUnit = prior && prior.costPerUnit != null ? Number(prior.costPerUnit) : ing.cost;
    return {
      ingId: ri.ingId,
      name: ing.name,
      qtyEntered: totalEntered,
      unit: fromUnit,
      qtyInStorage: qtyOk ? qtyInStorage : 0,
      storageUnit: ing.unit,
      costPerUnit,
      lineCost: qtyOk ? qtyInStorage * costPerUnit : 0,
      conversionError: !qtyOk
    };
  }).filter(Boolean);
  const ingredientCost = lines.reduce((s,l)=>s+l.lineCost,0);
  return { lines, ingredientCost };
}
// Read the full order form payload (used by both save and saveEdit)
// priorSnapshot: when editing, pass the existing order/quote's ingredientSnapshot so
// per-line costPerUnit is preserved instead of being rewritten at today's prices.
function readOrderFormPayload(priorSnapshot){
  const customer = document.getElementById('m-ocust').value.trim();
  if (!customer) { alert('Customer name required.'); return null; }
  const recipeId = parseInt(document.getElementById('m-orec').value);
  const r = getRecipe(recipeId);
  if (!r) { alert('Pick a recipe.'); return null; }
  const qty = parseInt(document.getElementById('m-oqty').value) || 1;
  const sellPricePerUnit = parseFloat(document.getElementById('m-osell').value) || 0;
  const labour           = parseFloat(document.getElementById('m-olabour').value) || 0;
  const electricity      = parseFloat(document.getElementById('m-oelec').value) || 0;
  const overhead         = parseFloat(document.getElementById('m-oover').value) || 0;
  const transportCost    = parseFloat(document.getElementById('m-otrans').value) || 0;
  const packaging = readPackagingFromForm('m-opack-rows');
  const addons    = readAddonsFromForm('m-oaddon-rows');
  const snap = buildOrderSnapshot(r, qty, priorSnapshot);
  const packagingTotal = packaging.reduce((s,p)=>s+Number(p.price||0),0) * qty;
  const cakeCost = snap.ingredientCost + labour + electricity + overhead + packagingTotal;
  const cidRaw = document.getElementById('m-ocustid')?.value;

  return {
    customer,

    transportCost,

// Resolve a customer id for an order/quote save: pick the linked id if present,
// else find by phone, then by name, else create a fresh customer.
async function resolveCustomerForPayload(p){

  if (!p.customer) return null;
  const byPhone = p.customerPhone ? findCustomerByPhone(p.customerPhone) : null;
  if (byPhone) return byPhone.id;
  const byName = findCustomerByName(p.customer);
  if (byName) return byName.id;
  // Create new — normalize phone so in-memory matches what we persist
  const id = S.nextCustomerId++;
  const cust = {
    id, name: p.customer,
    phone: normalizePhone(p.customerPhone),
    email: p.customerEmail || '',
    address: p.customerAddress || '',
    notes: '', birthday: null, tags: [],
    createdAt: new Date().toISOString()
  };

  logAction('add','Customer auto-created from order', `${cust.name}${cust.phone?' — '+cust.phone:''}`,'customer',id);
  await persistWrite('addCustomer', cust, activityLog[0]);
  return id;
}

async function bulkMarkDone(){

  let processed = 0, skipped = 0;
  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const o = S.orders.find(x => x.id === id);
    if (progress) progress.textContent = `Processing ${i+1} of ${ids.length}…`;

const _cycleInFlight = new Set();
async function cycleStatus(id){
  if (_cycleInFlight.has(id)) return;  // guard against rapid double-clicks
  _cycleInFlight.add(id);
  try {
  const o=S.orders.find(x=>x.id===id); if(!o) return;
  const r=getRecipe(o.recipeId);
  const movingToDone = o.status === 'pending';
  // Build stock deltas: subtract on Done, add back on undo
  const snapshot = Array.isArray(o.ingredientSnapshot) ? o.ingredientSnapshot : [];
  const sign = movingToDone ? -1 : 1;
  const stockDeltas = snapshot.map(line => ({ ingId: line.ingId, delta: sign * (parseFloat(line.qtyInStorage) || 0) }));
  // Warn if marking Done would push any stock negative
  if (movingToDone) {
    const shortages = [];
    snapshot.forEach(line => {
      const ing = getIng(line.ingId);
      if (!ing) return;
      const need = parseFloat(line.qtyInStorage) || 0;
      if (parseFloat(ing.stock) < need) {
        shortages.push(`${ing.name}: have ${ing.stock} ${ing.storageUnit||ing.unit}, need ${need}`);
      }
    });
    if (shortages.length) {
      const proceed = confirm(`Insufficient stock to mark this order Done:\n\n${shortages.join('\n')}\n\nMark Done anyway? (Stock will go negative.)`);
      if (!proceed) return;
    }
  }
  // Apply deltas locally
  stockDeltas.forEach(d => {
    const ing = getIng(d.ingId);
    if (ing) ing.stock = Math.round((parseFloat(ing.stock) + d.delta) * 1000) / 1000;
  });
  o.status = movingToDone ? 'done' : 'pending';
  o.completedDate = movingToDone ? today() : '';
  logAction('order',`Order marked ${o.status}`,`${o.customer} — ${r?r.name:''} × ${o.qty}`,'order',o.id);
  renderOrders();
  await persistWrite('updateOrderStatus', { id: o.id, status: o.status, completedDate: o.completedDate, stockDeltas }, activityLog[0]);
  } finally {
    _cycleInFlight.delete(id);
  }
}
async function deleteOrder(id){
  const o=S.orders.find(x=>x.id===id);
  // If we're deleting a Done order, restore the stock that was deducted at Done time
  let stockDeltas = [];

    stockDeltas = o.ingredientSnapshot.map(line => ({
      ingId: line.ingId,
      delta: +(parseFloat(line.qtyInStorage) || 0)
    }));
    stockDeltas.forEach(d => {
      const ing = getIng(d.ingId);
      if (ing) ing.stock = Math.round((parseFloat(ing.stock) + d.delta) * 1000) / 1000;
    });
  }
  const restoredNote = stockDeltas.length ? ' (stock restored)' : '';
  logAction('delete','Order deleted', o?`${o.customer} — ${fmtDate(o.dueDate)}${restoredNote}`:'', 'order', id);
  S.orders=S.orders.filter(x=>x.id!==id); renderOrders();
  await persistWrite('deleteOrder', { id, stockDeltas }, activityLog[0]);
}

  const cakeMargin = cakeRevenue > 0 ? Math.round(cakeProfit / cakeRevenue * 100) : 0;
  const at = addonTotals(o);
  const addonRevenue = at.revenue, addonCost = at.cost;
  const totalRevenue = cakeRevenue + addonRevenue;
  const totalCost    = cakeCost   + addonCost;
  const totalProfit  = totalRevenue - totalCost;
  const totalMargin  = totalRevenue > 0 ? Math.round(totalProfit / totalRevenue * 100) : 0;
  const invoiceTotal = totalRevenue + transport;
  const lines = Array.isArray(o.ingredientSnapshot) ? o.ingredientSnapshot : [];
  const cakeColor  = cakeMargin  >= 40 ? 'var(--success)' : cakeMargin  >= 20 ? 'var(--warning)' : 'var(--danger)';
  const totalColor = totalMargin >= 40 ? 'var(--success)' : totalMargin >= 20 ? 'var(--warning)' : 'var(--danger)';
  const isLegacy = labour == null && elec == null && packPerU == null && packaging.length === 0;
  const editVisible = o.status === 'pending';
  showModal(`<div class="modal-title">Order #${o.id} — ${esc(o.customer)}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;line-height:1.6">
      ${o.customerPhone ? `📞 ${esc(o.customerPhone)} &nbsp; ` : ''}
      ${o.customerEmail ? `✉️ ${esc(o.customerEmail)} &nbsp; ` : ''}
      ${o.customerAddress ? `<br>📍 ${esc(o.customerAddress)}` : ''}
      ${o.customerId ? `<br><a href="#" onclick="closeModal();showCustomerDetail(${o.customerId});return false" style="color:var(--caramel-dark)">View customer profile →</a>` : ''}
    </div>
    <div class="modal-section-title">Order details</div>
    <div class="kv-row"><span class="kv-label">Recipe</span><span class="kv-value"><strong>${r ? esc(r.name) : '?'}</strong> × ${o.qty}</span></div>
    <div class="kv-row"><span class="kv-label">Due</span><span class="kv-value">${fmtDate(o.dueDate)}</span></div>
    ${o.category ? `<div class="kv-row"><span class="kv-label">Category</span><span class="kv-value">${esc(o.category)}</span></div>` : ''}
    <div class="kv-row"><span class="kv-label">Status</span><span class="badge ${o.status==='done'?'badge-ok':'badge-warn'}">${esc(o.status)}</span></div>
    ${o.completedDate ? `<div class="kv-row"><span class="kv-label">Completed</span><span class="kv-value">${fmtDate(o.completedDate)}</span></div>` : ''}
    ${o.note ? `<div style="font-size:12px;color:var(--text-secondary);margin:10px 0;padding:10px 12px;background:var(--surface-soft);border-radius:6px;border-left:3px solid var(--caramel)">📝 ${esc(o.note)}</div>` : ''}
    <div class="modal-section-title">Ingredients <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">— snapshot at order time</span></div>
    ${lines.length === 0
      ? `<div style="color:var(--text-muted);font-size:12px;padding:8px 0">No ingredient snapshot — live recipe cost: ${fmtMoney(r ? calcIngCost(r) * o.qty : 0)}</div>`
      : lines.map(l => `<div class="kv-row"><span class="kv-label">${esc(l.name)} <span style="color:var(--text-muted)">— ${l.qtyEntered} ${esc(l.unit)}</span></span><span class="kv-value">${fmtMoney(l.lineCost)}</span></div>`).join('')}
    ${isLegacy ? '' : `
    <div class="modal-section-title">Batch costs</div>
    ${labour   != null ? `<div class="kv-row"><span class="kv-label">Labour</span><span class="kv-value">${fmtMoney(labour)}</span></div>` : ''}
    ${elec     != null ? `<div class="kv-row"><span class="kv-label">Electricity</span><span class="kv-value">${fmtMoney(elec)}</span></div>` : ''}
    ${overhead != null ? `<div class="kv-row"><span class="kv-label">Overhead</span><span class="kv-value">${fmtMoney(overhead)}</span></div>` : ''}
    `}
    ${packaging.length ? `
    <div class="modal-section-title">Packaging (${o.qty}× per cake)</div>
    ${packaging.map(p => `<div class="kv-row"><span class="kv-label">${esc(p.item)} <span style="color:var(--text-muted)">@ ${fmtMoney(p.price)}</span></span><span class="kv-value">${fmtMoney(Number(p.price||0) * o.qty)}</span></div>`).join('')}
    <div class="kv-row" style="font-weight:600"><span>Packaging total</span><span>${fmtMoney(packagingTotal)}</span></div>
    ` : (packPerU != null ? `
    <div class="modal-section-title">Packaging</div>
    <div class="kv-row"><span class="kv-label">Packing (${o.qty} × ${fmtMoney(packPerU)})</span><span class="kv-value">${fmtMoney(packPerU * o.qty)}</span></div>
    ` : '')}
    ${addons.length ? `
    <div class="modal-section-title">Add-ons</div>
    ${addons.map(a => `<div class="kv-row"><span class="kv-label">${esc(a.name)} <span style="color:var(--text-muted)">× ${a.qty} @ ${fmtMoney(a.price)}</span></span><span class="kv-value">${fmtMoney(Number(a.price||0) * Number(a.qty||0))}</span></div>`).join('')}
    <div class="kv-row" style="font-size:11px;color:var(--text-muted)"><span>Add-on cost</span><span>${fmtMoney(addonCost)}</span></div>
    ` : ''}
    <div class="totals-block">
      <div class="kv-row" style="font-weight:600"><span>Total cake cost</span><span>${fmtMoney(cakeCost)}</span></div>
      <div class="kv-row" style="color:var(--success)"><span class="kv-label">Cake sell (${o.qty} × ${fmtMoney(sellPerU)})</span><span class="kv-value" style="font-weight:600">${fmtMoney(cakeRevenue)}</span></div>
      <div class="kv-row" style="font-weight:600"><span>Cake profit</span><span style="color:${cakeColor}">${fmtMoney(cakeProfit)} (${cakeMargin}%)</span></div>
      ${addons.length ? `
      <div style="border-top:1px dashed var(--border-light);margin:6px 0 4px"></div>
      <div class="kv-row"><span class="kv-label">Add-on revenue</span><span class="kv-value">${fmtMoney(addonRevenue)}</span></div>
      <div class="kv-row" style="font-weight:600"><span>Total profit (cake + add-ons)</span><span style="color:${totalColor}">${fmtMoney(totalProfit)} (${totalMargin}%)</span></div>
      ` : ''}
      <div style="border-top:1px dashed var(--border-light);margin:6px 0 2px"></div>
      <div class="kv-row" style="font-size:11px;color:var(--text-muted)"><span>Transport (billed separately)</span><span>${fmtMoney(transport)}</span></div>
      <div class="kv-row" style="font-weight:600"><span>Invoice total</span><span>${fmtMoney(invoiceTotal)}</span></div>
    </div>
    <div class="modal-section-title">Payments <span id="m-pay-status" class="pay-pill ${getPaymentStatus(o)==='Unpaid'?'pay-unpaid':getPaymentStatus(o)==='Fully Paid'?'pay-paid':'pay-deposit'}" style="margin-left:8px;text-transform:none;letter-spacing:0">${getPaymentStatus(o)}</span></div>
    <div id="m-pay-invoice" data-total="${invoiceTotal}"></div>
    <div class="form-row">
      <div class="form-group"><label>Deposit amount (${CURRENCY})</label><input id="m-pay-deposit-amt" type="number" step="0.01" value="${o.depositAmount || 0}" oninput="recalcBalanceAmount()"></div>
      <div class="form-group"><label>Deposit date</label><input id="m-pay-deposit-date" type="date" value="${o.depositDate || ''}" onchange="refreshPaymentStatusPreview()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Balance amount (${CURRENCY})</label><input id="m-pay-balance-amt" type="number" step="0.01" value="${o.balanceAmount || Math.max(0, invoiceTotal - (Number(o.depositAmount)||0)).toFixed(2)}"></div>
      <div class="form-group"><label>Balance date</label><input id="m-pay-balance-date" type="date" value="${o.balanceDate || ''}" onchange="refreshPaymentStatusPreview()"></div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:-4px">Balance auto-fills as (Invoice total − Deposit). Editable. Setting a Balance date marks the order Fully Paid.</div>
    <div style="margin-top:10px"><button class="btn btn-primary btn-sm" onclick="saveOrderPayment(${o.id})">Save payment</button></div>
    <div class="modal-section-title">WhatsApp <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">— opens in a new tab with the message pre-filled</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;${o.customerPhone?'':'opacity:0.55'}">
      <button class="btn btn-sm" ${o.customerPhone?'':'disabled'} title="${o.customerPhone?'Send order confirmation':'Add phone number to customer to enable'}" onclick="openWhatsAppForOrder(${o.id}, 'ORDER_CONFIRM')">📱 Order Confirmed</button>
      <button class="btn btn-sm" ${o.customerPhone?'':'disabled'} title="${o.customerPhone?'Tell the customer the order is ready':'Add phone number to customer to enable'}" onclick="openWhatsAppForOrder(${o.id}, 'READY_COLLECT')">📱 Ready to Collect</button>
      <button class="btn btn-sm" ${o.customerPhone?'':'disabled'} title="${o.customerPhone?'Send a balance-due reminder':'Add phone number to customer to enable'}" onclick="openWhatsAppForOrder(${o.id}, 'PAYMENT_REMINDER')">📱 Payment Reminder</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap">
      ${editVisible ? `<button class="btn btn-primary" onclick="closeModal();showEditOrder(${o.id})">Edit</button>` : ''}
      <button class="btn ${o.status==='pending'?'btn-chocolate':''}" onclick="closeModal();cycleStatus(${o.id})">${o.status==='pending'?'✓ Mark Done':'Undo (back to pending)'}</button>
      <button class="btn" onclick="printInvoiceForOrder(${o.id})">🖨 Generate Invoice</button>
      <button class="btn" onclick="closeModal();showCloneOrder(${o.id})">Clone</button>
      <button class="btn" onclick="closeModal();showEntityHistory('order', ${o.id}, ${JSON.stringify('Order #'+o.id+' — '+o.customer)})">Change log</button>
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-danger" style="margin-left:auto" onclick="if(confirm('Delete this order? This cannot be undone.')){closeModal();deleteOrder(${o.id})}">Delete</button>
    </div>`, { wide: true });
}
// B1: payment section handlers
function recalcBalanceAmount(){
  const totalEl = document.getElementById('m-pay-invoice');
  const invoiceTotal = totalEl ? Number(totalEl.dataset.total) || 0 : 0;
  const dep = parseFloat(document.getElementById('m-pay-deposit-amt').value) || 0;
  const bal = Math.max(0, invoiceTotal - dep);
  const balEl = document.getElementById('m-pay-balance-amt');
  if (balEl) balEl.value = bal.toFixed(2);
  refreshPaymentStatusPreview();
}
function refreshPaymentStatusPreview(){
  const depDate = (document.getElementById('m-pay-deposit-date')||{}).value || '';
  const balDate = (document.getElementById('m-pay-balance-date')||{}).value || '';
  const el = document.getElementById('m-pay-status');
  if (!el) return;
  let status = 'Unpaid', cls = 'pay-unpaid';
  if (balDate)      { status = 'Fully Paid';   cls = 'pay-paid'; }
  else if (depDate) { status = 'Deposit Paid'; cls = 'pay-deposit'; }
  el.className = 'pay-pill ' + cls;
  el.textContent = status;
}
async function saveOrderPayment(id){
  const o = S.orders.find(x => x.id === id); if (!o) return;
  const depositAmount = parseFloat(document.getElementById('m-pay-deposit-amt').value) || 0;
  const depositDate   = document.getElementById('m-pay-deposit-date').value || '';
  const balanceAmount = parseFloat(document.getElementById('m-pay-balance-amt').value) || 0;
  const balanceDate   = document.getElementById('m-pay-balance-date').value || '';
  const before = { depositAmount: Number(o.depositAmount)||0, depositDate: o.depositDate||'', balanceAmount: Number(o.balanceAmount)||0, balanceDate: o.balanceDate||'' };
  Object.assign(o, { depositAmount, depositDate, balanceAmount, balanceDate });
  const after = { depositAmount, depositDate, balanceAmount, balanceDate };
  const fc = diffFields(before, after);
  const status = getPaymentStatus(o);
  logAction('edit','Order payment updated', `#${id} ${o.customer} — ${status} (deposit ${fmtMoney(depositAmount)}, balance ${fmtMoney(balanceAmount)})`, 'order', id, fc);
  showToast(`Payment saved — ${status}`, 'success');
  _modalDirty = false;  // payment is saved; let Close skip the dirty prompt
  renderOrders();
  await persistWrite('updateOrderPayment', { id, depositAmount, depositDate, balanceAmount, balanceDate }, activityLog[0]);
}


// ─── AUTH ─────────────────────────────────────────────────────
// CakeUz uses Supabase Auth (email + password). Accounts are pre-created
// in the Supabase Dashboard; public sign-up is disabled. Once RLS is on,
// the anon key alone has no access — every read/write requires a session.
function showLoginScreen() {
  document.getElementById('login-screen').classList.add('visible');
  document.querySelector('.app-shell').classList.remove('visible');
}
function showAppShell(session) {
  document.getElementById('login-screen').classList.remove('visible');
  document.querySelector('.app-shell').classList.add('visible');
  const chip = document.getElementById('topbar-user');
  if (chip && session && session.user) chip.textContent = session.user.email || '';
}
async function handleLogin(ev) {
  ev.preventDefault();
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-submit');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      err.textContent = error.message || 'Sign-in failed.';
    }
    // success → onAuthStateChange triggers the app load
  } catch (e) {
    err.textContent = e.message || 'Sign-in failed.';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}
async function handleLogout() {
  await sb.auth.signOut();
  // onAuthStateChange handles UI swap + reload
}

// ─── BOOT ─────────────────────────────────────────────────────
async function loadDataIntoState() {
  showLoading('Loading your data...');
  const result = await dbGet('load');
  if (result && result.ok) {
    S.ingredients   = result.ingredients   || [];
    S.recipes       = result.recipes       || [];
    S.orders        = result.orders        || [];
    S.shoppingTrips = result.shoppingTrips || [];
    S.quotations    = result.quotations    || [];
    S.customers     = result.customers     || [];
    S.priceHistory  = result.priceHistory  || {};
    activityLog.length = 0;
    (result.activityLog || []).forEach(l => activityLog.push(l));
    S.nextIngId       = S.ingredients.length   ? Math.max(...S.ingredients.map(i=>i.id))   + 1 : 1;
    S.nextRecipeId    = S.recipes.length       ? Math.max(...S.recipes.map(r=>r.id))       + 1 : 1;
    S.nextOrderId     = S.orders.length        ? Math.max(...S.orders.map(o=>o.id))        + 1 : 1;
    S.nextTripId      = S.shoppingTrips.length ? Math.max(...S.shoppingTrips.map(t=>t.id)) + 1 : 1;
    S.nextQuotationId = S.quotations.length    ? Math.max(...S.quotations.map(q=>q.id))    + 1 : 1;
    S.nextCustomerId  = S.customers.length     ? Math.max(...S.customers.map(c=>c.id))     + 1 : 1;
  } else {
    const err = (result && result.error) || 'unknown error';
    showToast('Could not load data — ' + err, 'error');
  }
  hideLoading();
  renderDashboard();
}
async function init() {
  showDbBanner();
  if (!DB_ENABLED) { renderDashboard(); return; }
  // Auth check — show login or app based on session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showAppShell(session);
    await loadDataIntoState();
  } else {
    showLoginScreen();
  }
  // React to sign-in / sign-out from this tab or another tab
  sb.auth.onAuthStateChange((event, sess) => {
    if (event === 'SIGNED_IN') {
      // Hard reload to ensure a clean app state with the new session
      location.reload();
    } else if (event === 'SIGNED_OUT') {
      // Wipe in-memory state so a sign-in by a different user starts fresh
      location.reload();
    }
  });
}
init();

</script>
</body>
