<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CakeUz — by Asanka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream:#F9F9FB;--warm-white:#FFFFFF;--caramel:#F5A623;--caramel-light:#F7BC55;
  --caramel-dark:#D4881A;--chocolate:#2D3E50;--chocolate-mid:#3D5166;--mocha:#5A7189;
  --blush:#FEF3D8;--text-primary:#1A2A38;--text-secondary:#4A6076;--text-muted:#8A9FAF;
  --border:#D8E3EC;--border-light:#EBF1F6;--success:#3A8A5A;--warning:#E09020;
  --danger:#C04040;--shadow-sm:0 1px 3px rgba(45,62,80,0.08);
  --shadow-md:0 4px 16px rgba(45,62,80,0.1);--shadow-lg:0 12px 40px rgba(45,62,80,0.15);
  --radius:12px;--radius-sm:8px;--radius-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh}
.topbar{background:#FFFFFF;border-bottom:2px solid var(--caramel);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;background:var(--caramel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-family:'Playfair Display',serif;font-size:22px;color:#FDF8F2;font-weight:600}
.brand-sub{font-size:11px;color:var(--mocha);letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
.topbar-date{font-size:12px;color:var(--text-secondary)}
.nav-wrap{background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;gap:0;overflow-x:auto}
.nav-btn{padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.nav-btn:hover{color:var(--chocolate)}
.nav-btn.active{color:var(--caramel-dark);border-bottom-color:var(--caramel);font-weight:600}
.main{padding:2rem;max-width:1200px;margin:0 auto}
.card{background:var(--warm-white);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--chocolate)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:var(--warm-white);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
.metric-label{font-size:10px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.metric-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--chocolate)}
.metric-val.green{color:var(--success)}.metric-val.amber{color:var(--warning)}.metric-val.red{color:var(--danger)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:10px 10px;border-bottom:1px solid var(--border-light);color:var(--text-primary);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(200,132,58,0.03)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:#EBF5EB;color:var(--success)}.badge-warn{background:#FEF3E2;color:var(--warning)}
.badge-danger{background:#FDEAEA;color:var(--danger)}.badge-info{background:#EBF0FA;color:#4A6FA5}
.btn{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text-primary);transition:all 0.15s}
.btn:hover{background:var(--blush);border-color:var(--caramel-light)}
.btn-primary{background:var(--caramel);color:#FFF;border-color:var(--caramel)}
.btn-primary:hover{background:var(--caramel-dark);border-color:var(--caramel-dark)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-danger{border-color:#E0BBBB;color:var(--danger)}.btn-danger:hover{background:#FDEAEA;border-color:var(--danger)}
.btn-chocolate{background:var(--chocolate);color:#FDF8F2;border-color:var(--chocolate)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--warm-white);color:var(--text-primary);transition:border-color 0.15s}
input:focus,select:focus{outline:none;border-color:var(--caramel)}
.modal-overlay{position:fixed;inset:0;background:rgba(42,21,6,0.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--warm-white);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:modalIn 0.2s ease}
@keyframes modalIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--chocolate);margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border-light)}
.section{display:none}.section.active{display:block}
.ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ing-row select{flex:2}.ing-row input{flex:1}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;background:var(--cream);transition:all 0.2s}
.upload-zone:hover{border-color:var(--caramel-light);background:var(--blush)}
.receipt-thumb{width:56px;height:56px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer}
.price-up{color:var(--danger);font-size:11px;font-weight:600}.price-down{color:var(--success);font-size:11px;font-weight:600}
.profit-bar-wrap{background:var(--blush);border-radius:4px;height:8px;overflow:hidden;margin-top:5px}
.profit-bar{height:8px;border-radius:4px;transition:width 0.5s ease}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--caramel);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.empty-state{text-align:center;padding:2rem;color:var(--text-muted);font-size:13px}
.trip-card{border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem;margin-bottom:10px;background:var(--cream)}
.hero-stat{background:linear-gradient(135deg,#2D3E50 0%,#3D5166 100%);border-radius:var(--radius-lg);padding:1.5rem 2rem;color:#FDF8F2;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-md)}
.hero-stat-main{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#FDF8F2}
.hero-stat-label{font-size:12px;color:var(--mocha);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:4px}
.hero-stat-sub{font-size:12px;color:var(--mocha);margin-top:4px}
.cake-emoji{font-size:48px;opacity:0.6}
.log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px;align-items:flex-start}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.log-time{font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:130px}
.log-action{font-weight:600;color:var(--text-primary)}
.log-detail{color:var(--text-secondary);font-size:12px;margin-top:2px}
.log-add{background:#5A8A5A}.log-edit{background:#C8843A}.log-delete{background:#B85555}.log-order{background:#4A6FA5}.log-shop{background:#8B5E3C}
</style>
</head>

<script>

// ═══════════════════════════════════════════════════════
// SUPABASE BACKEND
// Anon key is meant to be public; row-level security gates writes
// in a multi-user scenario. This app is single-user so RLS is off.
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://puwdbrsvqbxeanoewycy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1d2RicnN2cWJ4ZWFub2V3eWN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDY2ODIsImV4cCI6MjA5NDEyMjY4Mn0.Hqub2GM1iZuey5qzd2hOlP1G4QV98sigfgshd7p8g1k';
const DB_ENABLED = !!SUPABASE_URL && SUPABASE_URL.startsWith('http');
const sb = DB_ENABLED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

// dbGet/dbPost preserve their old interface; only the implementation swapped.
async function dbGet(action) {
  if (!DB_ENABLED) return null;
  if (action === 'load') return loadAllFromSupabase();
  if (action === 'init') return { ok: true };  // schema is fixed; nothing to migrate at runtime
  return { ok: false, error: 'Unknown GET action: ' + action };
}

async function dbPost(action, data, log) {
  if (!DB_ENABLED) return null;
  try {
    const result = await dispatchWrite(action, data);
    // Fire-and-forget log piggyback. Failure here doesn't fail the main op.
    if (log && result && result.ok) {
      sbAddLog(log).catch(e => console.warn('addLog failed:', e));
    }
    return result;
  } catch (e) {
    console.error('Supabase write error:', e);
    return { ok: false, error: e.message || String(e) };
  }
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadAllFromSupabase() {
  try {
    const [ing, ph, rec, ri, ord, trip, si, log] = await Promise.all([
      sb.from('ingredients').select('*').order('id'),
      sb.from('price_history').select('*'),
      sb.from('recipes').select('*').order('id'),
      sb.from('recipe_ingredients').select('*'),
      sb.from('orders').select('*').order('id'),
      sb.from('shopping_trips').select('*').order('id'),
      sb.from('shopping_items').select('*'),
      sb.from('activity_log').select('*').order('time', { ascending: false }).limit(1000)
    ]);
    for (const r of [ing, ph, rec, ri, ord, trip, si, log]) {
      if (r.error) throw r.error;
    }

    const ingredients = ing.data.map(r => ({
      id: r.id, name: r.name, stock: Number(r.stock), unit: r.unit, cost: Number(r.cost)
    }));

    const priceHistory = {};
    for (const p of ph.data) {
      const key = String(p.ing_id);
      if (!priceHistory[key]) priceHistory[key] = [];
      priceHistory[key].push({ date: p.date, cost: Number(p.cost) });
    }

    const recipes = rec.data.map(r => {
      const ringredients = ri.data
        .filter(x => x.recipe_id === r.id)
        .map(x => ({ ingId: x.ing_id, qty: Number(x.qty), unit: x.unit || '' }));
      return {
        id: r.id,
        name: r.name,
        yield: r.yield || '',
        sellPrice: Number(r.suggested_sell_price || 0),  // alias kept for backward-compat with existing UI
        suggestedSellPrice: Number(r.suggested_sell_price || 0),
        defaultLabour: Number(r.default_labour ?? 20),
        defaultElectricity: Number(r.default_electricity ?? 5),
        defaultPackingPerUnit: Number(r.default_packing_per_unit ?? 2),
        ingredients: ringredients
      };
    });

    const orders = ord.data.map(o => ({
      id: o.id,
      customer: o.customer,
      customerPhone: o.customer_phone || '',
      customerEmail: o.customer_email || '',
      customerAddress: o.customer_address || '',
      recipeId: o.recipe_id,
      qty: o.qty,
      note: o.note || '',
      dueDate: o.due_date,
      status: o.status,
      sellPriceSnapshot: Number(o.sell_price_per_unit || 0),  // alias for the old field name
      sellPricePerUnit: Number(o.sell_price_per_unit || 0),
      labour: o.labour !== null ? Number(o.labour) : null,
      electricity: o.electricity !== null ? Number(o.electricity) : null,
      packingPerUnit: o.packing_per_unit !== null ? Number(o.packing_per_unit) : null,
      transportCost: Number(o.transport_cost || 0),
      ingredientCost: Number(o.ingredient_cost || 0),
      cakeCost: Number(o.cake_cost || 0),
      ingredientSnapshot: Array.isArray(o.ingredient_snapshot) ? o.ingredient_snapshot : [],
      completedDate: o.completed_date || ''
    }));

    const shoppingTrips = trip.data.map(t => {
      const items = si.data
        .filter(x => x.trip_id === t.id)
        .map(x => ({ ingId: x.ing_id, qty: Number(x.qty), unitPrice: Number(x.unit_price) }));
      return {
        id: t.id, date: t.date, shop: t.shop || '', total: Number(t.total),
        receiptImg: t.receipt_img || '', items
      };
    });

    const activityLog = log.data.map(l => ({
      type: l.type || '',
      action: l.action || '',
      detail: l.detail || '',
      time: typeof l.time === 'string'
        ? new Date(l.time).toLocaleString('en-SG', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
        : String(l.time || ''),
      entityType: l.entity_type || '',
      entityId: l.entity_id || null,
      fieldChanges: l.field_changes || null
    }));

    return { ok: true, ingredients, priceHistory, recipes, orders, shoppingTrips, activityLog };
  } catch (e) {
    console.error('Supabase load error:', e);
    return { ok: false, error: e.message || String(e) };
  }
}

  const { error } = await sb.from('orders').update(updates).eq('id', d.id);

  const itemRows = (d.items || []).map(i => ({

  }));
  if (itemRows.length) {
    const { error: e2 } = await sb.from('shopping_items').insert(itemRows);
    if (e2) return { ok: false, error: e2.message };
  }
  // Update each ingredient's stock + (if unit price > 0) cost + price history
  for (const item of d.items || []) {

    const updates = { stock: Math.round((Number(ing.stock) + Number(item.qty)) * 1000) / 1000 };

    }
    await sb.from('ingredients').update(updates).eq('id', item.ingId);
  }
  return { ok: true, id: trip.id };

// Persist with error surfacing. Returns true on success, false on failure.
// Pass an optional `log` entry to piggyback an activity-log write in the same
// POST — saves one round trip per save action.
async function persistWrite(action, data, log) {
  if (!DB_ENABLED) return false;
  const res = await dbPost(action, data, log);
  if (!res || res.ok !== true) {
    const err = (res && res.error) || 'connection error';
    showToast('Save failed (' + action + '): ' + err, 'error');
    return false;
  }
  return true;
}

// ─── UNIT CONVERSION ─────────────────────────────────────────────────────────
// Family-based conversion: mass (base g), volume (base ml), count (base pcs).
// Used to let a recipe say "250 g" while the ingredient is stored in kg, etc.
const UNITS = {
  // mass → grams
  'g':     { family: 'mass',   base: 1 },
  'kg':    { family: 'mass',   base: 1000 },
  'mg':    { family: 'mass',   base: 0.001 },
  'lb':    { family: 'mass',   base: 453.592 },
  'oz':    { family: 'mass',   base: 28.3495 },
  // volume → millilitres
  'ml':    { family: 'volume', base: 1 },
  'L':     { family: 'volume', base: 1000 },
  'fl oz': { family: 'volume', base: 29.5735 },
  'tsp':   { family: 'volume', base: 4.92892 },
  'tbsp':  { family: 'volume', base: 14.7868 },
  'cup':   { family: 'volume', base: 236.588 },
  // count
  'pcs':   { family: 'count',  base: 1 }
};
const ALL_UNITS = Object.keys(UNITS);
function unitFamily(u){ return (UNITS[u] && UNITS[u].family) || null; }
function unitsInFamily(fam){ return ALL_UNITS.filter(u => UNITS[u].family === fam); }
function unitsCompatible(a, b){ return unitFamily(a) && unitFamily(a) === unitFamily(b); }
function convertUnit(qty, fromUnit, toUnit){
  if (fromUnit === toUnit) return qty;
  const f = UNITS[fromUnit], t = UNITS[toUnit];
  if (!f || !t || f.family !== t.family) return null;
  return qty * f.base / t.base;
}
function unitOptionsHtml(selected, family){
  const list = family ? unitsInFamily(family) : ALL_UNITS;
  return list.map(u => `<option value="${u}"${u===selected?' selected':''}>${u}</option>`).join('');
}

// HTML-escape for any user-typed string going into innerHTML or attribute values.
// Without this, an ingredient/customer/note containing < or " could execute scripts.
function esc(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
const fmtPct = n => Math.round(n)+"%";
// Accepts plain "YYYY-MM-DD" OR ISO timestamps coming back from Apps Script.
const fmtDate = d => {
  if (!d) return '';
  let dt;
  if (d instanceof Date) dt = d;
  else if (typeof d === 'string' && d.length === 10) dt = new Date(d + 'T00:00:00');
  else dt = new Date(d);
  return isNaN(dt) ? '' : dt.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'});
};
// Normalises any date-like value to "YYYY-MM-DD" for safe string comparison.
const dateKey = d => {
  if (!d) return '';
  if (d instanceof Date) return d.toISOString().split('T')[0];
  if (typeof d === 'string') {
    if (d.length === 10) return d;
    const dt = new Date(d);
    return isNaN(dt) ? '' : dt.toISOString().split('T')[0];
  }
  return '';
};
const today = () => new Date().toISOString().split('T')[0];
const getIng = id => S.ingredients.find(i=>i.id===id);
const getRecipe = id => S.recipes.find(r=>r.id===id);
// Recipe ingredient line cost — converts qty to ingredient's storage unit if a recipe-time unit was chosen.
function calcRecipeLineCost(ri){
  const i = getIng(ri.ingId);
  if (!i) return 0;
  const fromUnit = ri.unit || i.unit;
  const qtyInStorage = convertUnit(ri.qty, fromUnit, i.unit);
  if (qtyInStorage === null) return 0;
  return i.cost * qtyInStorage;
}
const calcIngCost = r => (r.ingredients || []).reduce((s,ri)=> s + calcRecipeLineCost(ri), 0);
const ingOpts = (sel=null) => S.ingredients.map(i=>`<option value="${i.id}"${sel===i.id?' selected':''}>${esc(i.name)} (${esc(i.unit)})</option>`).join('');

// ─── ORDERS ──────────────────────────────────────────────────────────────────
function renderOrders(){
  // Sort: pending first (by dueDate asc), then done (by completedDate desc)
  const orders = [...S.orders].sort((a,b) => {
    if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
    if (a.status === 'pending') return dateKey(a.dueDate).localeCompare(dateKey(b.dueDate));
    return dateKey(b.completedDate||b.dueDate).localeCompare(dateKey(a.completedDate||a.dueDate));
  });
  const todayKey = today();
  const totalRevenueDone = orders.filter(o=>o.status==='done').reduce((s,o)=> s + (parseFloat(o.sellPricePerUnit) || parseFloat(o.sellPriceSnapshot) || (getRecipe(o.recipeId)?.sellPrice || 0)) * o.qty, 0);
  // Cake cost (NOT including transport — that's an invoiced pass-through)
  const totalCostDone = orders.filter(o=>o.status==='done').reduce((s,o)=> s + (parseFloat(o.cakeCost) || parseFloat(o.ingredientCost) || 0), 0);
  const totalProfitDone = totalRevenueDone - totalCostDone;
  document.getElementById('tab-orders').innerHTML = `
    <div class="metric-grid" style="margin-bottom:1rem">
      <div class="metric"><div class="metric-label">Pending</div><div class="metric-val amber">${orders.filter(o=>o.status==='pending').length}</div></div>
      <div class="metric"><div class="metric-label">Completed</div><div class="metric-val green">${orders.filter(o=>o.status==='done').length}</div></div>
      <div class="metric"><div class="metric-label">Revenue (done)</div><div class="metric-val">${fmtMoney(totalRevenueDone)}</div></div>
      <div class="metric"><div class="metric-label">Profit (done)</div><div class="metric-val ${totalProfitDone>=0?'green':'red'}">${fmtMoney(totalProfitDone)}</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Orders</span><button class="btn btn-primary btn-sm" onclick="showAddOrder()">+ New order</button></div>
      <table>
        <thead><tr><th style="width:14%">Customer</th><th style="width:11%">Phone</th><th style="width:18%">Item</th><th style="width:5%">Qty</th><th style="width:11%">Sell</th><th style="width:11%">Cost</th><th style="width:8%">Margin</th><th style="width:10%">Due</th><th style="width:8%">Status</th><th style="width:14%"></th></tr></thead>
        <tbody>${orders.map(o => {
          const r = getRecipe(o.recipeId);
          const overdue = o.status === 'pending' && dateKey(o.dueDate) < todayKey;
          const sell = (parseFloat(o.sellPricePerUnit) || parseFloat(o.sellPriceSnapshot) || (r ? r.sellPrice : 0)) * o.qty;
          // Use cake cost (ingredients + labour + electricity + packing) — not transport
          const cost = parseFloat(o.cakeCost) || parseFloat(o.ingredientCost) || (r ? calcIngCost(r) * o.qty : 0);
          const margin = sell > 0 ? Math.round((sell - cost) / sell * 100) : 0;
          return `<tr>
            <td style="font-weight:500">${esc(o.customer)}</td>
            <td style="font-size:11px;color:var(--text-secondary)">${esc(o.customerPhone || '—')}</td>
            <td style="white-space:normal;font-size:12px">${r ? esc(r.name) : '?'}</td>
            <td>${o.qty}</td>
            <td style="font-weight:500">${fmtMoney(sell)}</td>
            <td style="color:var(--text-secondary)">${fmtMoney(cost)}</td>
            <td><span class="badge ${margin>=40?'badge-ok':margin>=20?'badge-warn':'badge-danger'}">${margin}%</span></td>
            <td style="font-size:12px;${overdue?'color:var(--danger);font-weight:600':''}">${fmtDate(o.dueDate)}${overdue?' ⚠️':''}</td>
            <td><span class="badge ${o.status==='done'?'badge-ok':o.status==='cancelled'?'badge-danger':'badge-warn'}">${esc(o.status)}</span></td>
            <td><div style="display:flex;gap:4px;flex-wrap:wrap">
              <button class="btn btn-sm" onclick="showOrderDetail(${o.id})">View</button>
              <button class="btn btn-sm" onclick="showEntityHistory('order', ${o.id}, ${JSON.stringify('Order #'+o.id+' — '+o.customer)})">Log</button>
              <button class="btn btn-sm ${o.status==='pending'?'btn-chocolate':''}" onclick="cycleStatus(${o.id})">${o.status==='pending'?'✓ Done':'Undo'}</button>
              <button class="btn btn-sm btn-danger" onclick="if(confirm('Delete order?'))deleteOrder(${o.id})">Del</button>
            </div></td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

  document.getElementById('tab-pricing').innerHTML=`

        </div>
        <div class="form-group" style="margin-bottom:12px"><label>Target margin %</label><input type="number" id="pricing-margin" value="40" onchange="calcPricing()"></div>
      </div>
      <div id="pricing-results"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Recipe Margins at a Glance</span></div>
      <div>${S.recipes.map(r=>{
        const cost=calcIngCost(r);
        const m=r.sellPrice>0?Math.max(0,Math.round((r.sellPrice-cost)/r.sellPrice*100)):0;
        return `<div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span style="font-weight:500">${esc(r.name)}</span>
            <span style="font-weight:600;color:${m>=40?'var(--success)':'var(--warning)'}">${m}% &nbsp;<span style="color:var(--text-muted);font-weight:400">${fmtMoney(r.sellPrice)}</span></span>
          </div>
          <div class="profit-bar-wrap"><div class="profit-bar" style="width:${Math.min(100,m)}%;background:${m>=40?'var(--success)':'var(--warning)'}"></div></div>
        </div>`;
      }).join('')}</div>
    </div>`;

function calcPricing(){
  const r=getRecipe(parseInt(document.getElementById('pricing-recipe').value));
  if(!r) return;
  const ic=calcIngCost(r),ov=parseFloat(document.getElementById('pricing-overhead').value)||0;
  const lb=parseFloat(document.getElementById('pricing-labour').value)||0;
  const tm=parseFloat(document.getElementById('pricing-margin').value)||40;
  const ovc=ic*(ov/100),tc=ic+ovc+lb,suggested=tc/(1-tm/100);
  const actual=r.sellPrice>0?((r.sellPrice-tc)/r.sellPrice*100):0;
  document.getElementById('pricing-results').innerHTML=`
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><span class="card-title">Cost Breakdown</span></div>
      ${[['Ingredient cost',fmtMoney(ic),''],['Overhead',fmtMoney(ovc),''],['Labour',fmtMoney(lb),''],
        ['Total cost',fmtMoney(tc),'font-weight:600'],
        ['Suggested price ('+fmtPct(tm)+' margin)',fmtMoney(suggested),'font-weight:600;color:var(--success)'],
        ['Current sell price',fmtMoney(r.sellPrice),''],
        ['Actual margin',fmtPct(actual),`font-weight:600;color:${actual>=40?'var(--success)':'var(--danger)'}`]]
        .map(([k,v,s])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px"><span>${k}</span><span style="${s}">${v}</span></div>`).join('')}
    </div>`;
}

let _logSearchQ = '', _logEntityFilter = '';
function setLogSearch(q){ _logSearchQ = q || ''; renderActivityLogBody(); }
function setLogFilter(f){ _logEntityFilter = f || ''; renderActivityLogBody(); }

function renderActivityLog(){
  const chip = (label, val) => {
    const active = _logEntityFilter === val;
    return `<button class="btn btn-sm" style="${active?'background:var(--caramel);color:#fff':''}" onclick="setLogFilter('${val}')">${label}</button>`;
  };
  document.getElementById('tab-activitylog').innerHTML = `
    <div class="card">
      <div class="card-head">
        <span class="card-title">Activity Log</span>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input id="log-search" type="search" placeholder="Search..." value="${esc(_logSearchQ)}" oninput="setLogSearch(this.value)" style="font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;width:160px">
          <span style="font-size:11px;color:var(--text-muted)">${activityLog.length} total</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        ${chip('All','')} ${chip('Ingredients','ingredient')} ${chip('Recipes','recipe')} ${chip('Orders','order')} ${chip('Trips','trip')}
      </div>
      <div id="log-body"></div>
      ${activityLog.length>0?`<div style="margin-top:10px;text-align:right"><button class="btn btn-sm btn-danger" onclick="if(confirm('Clear ALL log entries? This cannot be undone.')){activityLog.length=0;persistWrite('clearLog',{});renderActivityLog()}">Clear log</button></div>`:''}
    </div>`;
  renderActivityLogBody();
}
function renderActivityLogBody(){
  const el = document.getElementById('log-body'); if (!el) return;
  const typeColors = {add:'log-add',edit:'log-edit',delete:'log-delete',order:'log-order',shop:'log-shop'};
  const q = _logSearchQ.trim().toLowerCase();
  const filtered = activityLog.filter(l => {
    if (_logEntityFilter && l.entityType !== _logEntityFilter) return false;
    if (q) {
      const hay = ((l.action||'') + ' ' + (l.detail||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching log entries.</div>';
    return;
  }
  el.innerHTML = filtered.map(l => `
    <div class="log-entry">
      <div class="log-dot ${typeColors[l.type]||'log-edit'}"></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="log-action">${esc(l.action)}</span>
          <span class="log-time">${esc(l.time)}</span>
        </div>
        <div class="log-detail">${esc(l.detail)}</div>
        ${l.fieldChanges ? renderFieldChanges(l.fieldChanges) : ''}
      </div>
    </div>`).join('');
}
function renderFieldChanges(fc){
  if (!fc || typeof fc !== 'object') return '';
  const rows = Object.entries(fc).map(([k, v]) => {
    const oldV = v && typeof v === 'object' ? v.old : '';
    const newV = v && typeof v === 'object' ? v.new : '';
    return `<tr><td style="padding:1px 6px 1px 0;color:var(--text-muted)">${esc(k)}</td><td style="padding:1px 6px;text-decoration:line-through;color:var(--danger)">${esc(String(oldV))}</td><td>→</td><td style="padding:1px 0 1px 6px;color:var(--success)">${esc(String(newV))}</td></tr>`;
  }).join('');
  return `<table style="font-size:11px;margin-top:4px"><tbody>${rows}</tbody></table>`;
}

// Per-entity history (called from "History" buttons on ingredient/recipe/order rows).
function showEntityHistory(entityType, entityId, label) {
  const entries = activityLog.filter(l => l.entityType === entityType && l.entityId === entityId);
  const typeColors = {add:'log-add',edit:'log-edit',delete:'log-delete',order:'log-order',shop:'log-shop'};
  const body = entries.length === 0
    ? '<div class="empty-state">No history recorded for this item yet.</div>'
    : entries.map(l => `
        <div class="log-entry">
          <div class="log-dot ${typeColors[l.type]||'log-edit'}"></div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span class="log-action">${esc(l.action)}</span>
              <span class="log-time">${esc(l.time)}</span>
            </div>
            <div class="log-detail">${esc(l.detail)}</div>
            ${l.fieldChanges ? renderFieldChanges(l.fieldChanges) : ''}
          </div>
        </div>`).join('');
  showModal(`<div class="modal-title">History — ${esc(label)}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${entries.length} entr${entries.length===1?'y':'ies'}</div>
    ${body}
    <div style="margin-top:1rem"><button class="btn" onclick="closeModal()">Close</button></div>`);
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
// Modal with dirty-guard: clicking outside or Esc only closes if no input was typed.
let _modalDirty = false;
function showModal(html){
  _modalDirty = false;
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)tryCloseModal()"><div class="modal" oninput="_modalDirty=true" onchange="_modalDirty=true">${html}</div></div>`;
}
function closeModal(){
  _modalDirty = false;
  document.getElementById('modal-root').innerHTML = '';
}
function tryCloseModal(){
  if (_modalDirty && !confirm('Discard unsaved changes?')) return;
  closeModal();
}
// Esc key also goes through the dirty guard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.querySelector('.modal-overlay')) tryCloseModal();
});

function showAddIngredient(){
  showModal(`<div class="modal-title">Add Ingredient</div>
    <div class="form-row"><div class="form-group"><label>Name</label><input id="m-name" placeholder="e.g. Almond flour"></div></div>
    <div class="form-row">
      <div class="form-group"><label>Storage unit</label><select id="m-unit" onchange="updateAddIngHelper()">${unitOptionsHtml('kg')}</select></div>
      <div class="form-group"><label>Quantity bought</label><input id="m-stock" type="number" value="1" step="0.001" oninput="updateAddIngHelper()"></div>
      <div class="form-group"><label>Total price (${CURRENCY})</label><input id="m-price" type="number" value="0" step="0.01" oninput="updateAddIngHelper()"></div>
    </div>
    <div id="m-helper" style="font-size:12px;color:var(--text-muted);margin:-4px 0 8px">Per-unit cost will appear here once you enter quantity and price.</div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn btn-primary" onclick="saveIngredient()">Add ingredient</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
  updateAddIngHelper();
}
function updateAddIngHelper(){
  const el = document.getElementById('m-helper');
  if (!el) return;
  const stock = parseFloat(document.getElementById('m-stock').value) || 0;
  const price = parseFloat(document.getElementById('m-price').value) || 0;
  const unit = document.getElementById('m-unit').value;
  if (stock > 0 && price > 0) {
    el.innerHTML = `Per-unit cost: <strong>${fmtMoney(price/stock)}</strong> per ${unit}`;
  } else {
    el.textContent = 'Per-unit cost will appear here once you enter quantity and price.';
  }
}
async function saveIngredient(){
  const name=document.getElementById('m-name').value.trim(); if(!name) return alert('Please enter a name.');
  const stock=parseFloat(document.getElementById('m-stock').value)||0;
  const price=parseFloat(document.getElementById('m-price').value)||0;
  const unit=document.getElementById('m-unit').value;
  if (stock <= 0) return alert('Quantity must be greater than 0.');
  const cost = price > 0 ? price / stock : 0;
  const id=S.nextIngId++;
  S.ingredients.push({id,name,stock,unit,cost});
  S.priceHistory[id]=[{date:today(),cost}];
  logAction('add','Ingredient added',`${name} — ${stock} ${unit} for ${fmtMoney(price)} (${fmtMoney(cost)}/${unit})`,'ingredient',id);
  closeModal(); renderInventory();

async function saveEditIngredient(id){
  const i=getIng(id);
  const oldCost=i.cost, oldStock=i.stock, oldName=i.name, oldUnit=i.unit;
  const newName = document.getElementById('m-name').value.trim();
  const newUnit = document.getElementById('m-unit').value;
  let newStock = parseFloat(document.getElementById('m-stock').value) || 0;
  let newCost = parseFloat(document.getElementById('m-cost').value) || 0;
  // Check for a new purchase entry
  const buyQty = parseFloat(document.getElementById('m-buyqty').value) || 0;
  const buyPrice = parseFloat(document.getElementById('m-buyprice').value) || 0;
  let priceChangedByPurchase = false;
  if (buyQty > 0 && buyPrice > 0) {
    newStock = (parseFloat(i.stock) || 0) + buyQty;
    newCost = buyPrice / buyQty;
    priceChangedByPurchase = true;
  }
  i.name = newName;
  i.unit = newUnit;
  i.stock = newStock;
  const priceChanged = newCost !== oldCost;
  if (priceChanged) {
    i.cost = newCost;
    if (!S.priceHistory[id]) S.priceHistory[id] = [];
    S.priceHistory[id].push({ date: today(), cost: newCost });
  }
  let detail = newName;
  if (newName !== oldName) detail += ` (was: ${oldName})`;
  if (priceChangedByPurchase) detail += ` — purchased ${buyQty} ${newUnit} for ${fmtMoney(buyPrice)} (${fmtMoney(newCost)}/${newUnit})`;
  else if (priceChanged) detail += ` — price: ${fmtMoney(oldCost)} → ${fmtMoney(newCost)}`;
  if (newStock !== oldStock && !priceChangedByPurchase) detail += ` — stock: ${oldStock} → ${newStock} ${newUnit}`;
  if (newUnit !== oldUnit) detail += ` — unit: ${oldUnit} → ${newUnit}`;
  const fc = diffFields(
    { name: oldName, stock: oldStock, unit: oldUnit, cost: oldCost },
    { name: newName, stock: newStock, unit: newUnit, cost: newCost }
  );
  logAction('edit','Ingredient updated', detail, 'ingredient', id, fc);
  closeModal(); renderInventory();
  await persistWrite('editIngredient', {id:i.id, name:i.name, stock:i.stock, unit:i.unit, cost:i.cost, priceChanged, date:today()}, activityLog[0]);
}

async function scanWithAI(){
  if(!receiptB64) return;
  const btn=document.getElementById('ai-btn'),status=document.getElementById('ai-status');
  btn.disabled=true; status.innerHTML=`<span class="spinner"></span> Reading receipt...`;
  const ingList=S.ingredients.map(i=>`${i.id}: ${i.name} (${i.unit})`).join('\n');
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:receiptMime,data:receiptB64}},{type:"text",text:`Read this grocery receipt. Currency is SGD.\nOur ingredients:\n${ingList}\nMatch receipt items to ingredients. Return ONLY valid JSON array, no markdown:\n[{"ingId":1,"qty":2,"unitPrice":1.20}]\nIf no match, return [].`}]}]})});
    const data=await res.json();
    const text=data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    const items=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(!Array.isArray(items)||items.length===0){status.innerHTML='<span style="color:var(--warning)">No matches — add items manually.</span>';btn.disabled=false;return;}
    document.getElementById('trip-rows').innerHTML='';
    items.forEach(it=>{
      const ing = getIng(it.ingId);
      const totalPrice = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
      addTripRow({ ingId: it.ingId, qty: it.qty, unit: ing ? ing.unit : 'kg', totalPrice });
    });
    status.innerHTML=`<span style="color:var(--success)">✓ Found ${items.length} item${items.length!==1?'s':''}. Review below.</span>`;
  }catch(err){status.innerHTML=`<span style="color:var(--danger)">Error: ${err.message}</span>`;}
  btn.disabled=false;
}
async function saveTrip(){
  const date=document.getElementById('m-tdate').value,shop=document.getElementById('m-tshop').value;
  const rows=document.querySelectorAll('#trip-rows .ing-row');
  const items=[]; let total=0;
  let conversionError = null;
  rows.forEach(row=>{
    const ingSel=row.querySelector('.trip-ing');
    const qtyInp=row.querySelector('.trip-qty');
    const unitSel=row.querySelector('.trip-unit');
    const priceInp=row.querySelector('.trip-price');
    if(!ingSel||!qtyInp||!unitSel||!priceInp) return;
    const ingId=parseInt(ingSel.value);
    const qtyEntered=parseFloat(qtyInp.value)||0;
    const unitEntered=unitSel.value;
    const priceTotal=parseFloat(priceInp.value)||0;
    if (qtyEntered <= 0 || priceTotal <= 0) return;
    const ing=getIng(ingId);
    if(!ing) return;
    // Convert entered qty to ingredient's storage unit
    const qtyInStorage = convertUnit(qtyEntered, unitEntered, ing.unit);
    if (qtyInStorage === null || qtyInStorage <= 0) {
      conversionError = `Cannot convert ${qtyEntered} ${unitEntered} of ${ing.name} to its storage unit (${ing.unit}). Pick a compatible unit.`;
      return;
    }
    const unitPriceStorage = priceTotal / qtyInStorage;
    items.push({ ingId, qty: qtyInStorage, unitPrice: unitPriceStorage });
    total += priceTotal;
    if (unitPriceStorage > 0 && unitPriceStorage !== ing.cost) {
      ing.cost = unitPriceStorage;
      if (!S.priceHistory[ingId]) S.priceHistory[ingId] = [];
      const last = S.priceHistory[ingId].slice(-1)[0];
      if (!last || last.cost !== unitPriceStorage) S.priceHistory[ingId].push({ date, cost: unitPriceStorage });
    }
    ing.stock = parseFloat((parseFloat(ing.stock) + qtyInStorage).toFixed(3));
  });
  if (conversionError) { alert(conversionError); return; }
  if (items.length === 0) { alert('Add at least one item with qty and price > 0.'); return; }
  const tripId=S.nextTripId++;
  const receiptImg = receiptB64?`data:${receiptMime};base64,${receiptB64}`:null;
  S.shoppingTrips.push({id:tripId,date,shop,items,total,receiptImg});
  logAction('shop','Shopping trip saved',`${shop||'Unnamed shop'} — ${items.length} items, total ${fmtMoney(total)}`,'trip',tripId);
  closeModal(); renderShopping();
  await persistWrite('addShoppingTrip', {id:tripId, date, shop, total, items, receiptImg: receiptImg||''}, activityLog[0]);
}

  const fieldChanges = diffFields(before, after);
  Object.assign(r, after, { ingredients: ings });
  logAction('edit','Recipe updated', `${name} — sell ${fmtMoney(r.sellPrice)}/unit, ${ings.length} ingredients`, 'recipe', id, fieldChanges);
  closeModal(); renderRecipes();
  await persistWrite('editRecipe',
    { id, name: r.name, yield: r.yield, sellPrice: r.sellPrice, ...batch, ingredients: ings },
    activityLog[0]
  );
}
// Compute before→after diff for audit log; returns null if nothing changed.
function diffFields(before, after){
  const changes = {};
  for (const k in after) {
    if (before[k] !== after[k]) changes[k] = { old: before[k], new: after[k] };
  }
  return Object.keys(changes).length ? changes : null;
}

    if (!i) return `<div class="history-row"><span style="color:var(--danger)">⚠ Missing ingredient (id ${ri.ingId})</span><span>—</span></div>`;

}
function updateOrderHelper(){

  const elec      = parseFloat(document.getElementById('m-oelec').value) || 0;
  const packPerU  = parseFloat(document.getElementById('m-opack').value) || 0;
  const transport = parseFloat(document.getElementById('m-otrans').value) || 0;

  const ingredientCost = calcIngCost(r) * qty;
  const cakeCost = ingredientCost + labour + elec + (packPerU * qty);
  const revenue  = sellPerU * qty;
  const profit   = revenue - cakeCost;
  const margin   = revenue > 0 ? Math.round(profit / revenue * 100) : 0;
  const invoiceTotal = revenue + transport;
  const marginColor = margin >= 40 ? 'var(--success)' : margin >= 20 ? 'var(--warning)' : 'var(--danger)';

    <div style="display:flex;justify-content:space-between"><span>Ingredients (${qty}×)</span><span>${fmtMoney(ingredientCost)}</span></div>

    <div style="display:flex;justify-content:space-between"><span>Electricity</span><span>${fmtMoney(elec)}</span></div>
    <div style="display:flex;justify-content:space-between"><span>Packing (${qty}× ${fmtMoney(packPerU)})</span><span>${fmtMoney(packPerU * qty)}</span></div>

    <div style="display:flex;justify-content:space-between"><span>Sell total (${qty} × ${fmtMoney(sellPerU)})</span><span>${fmtMoney(revenue)}</span></div>

// Build a snapshot of recipe ingredients scaled by orderQty, in storage units.
function buildOrderSnapshot(recipe, orderQty){
  const lines = (recipe.ingredients || []).map(ri => {
    const ing = getIng(ri.ingId);
    if (!ing) return null;
    const fromUnit = ri.unit || ing.unit;
    const totalEntered = ri.qty * orderQty;
    const qtyInStorage = convertUnit(totalEntered, fromUnit, ing.unit);
    const qtyOk = qtyInStorage !== null;
    return {
      ingId: ri.ingId,
      name: ing.name,
      qtyEntered: totalEntered,
      unit: fromUnit,
      qtyInStorage: qtyOk ? qtyInStorage : 0,
      storageUnit: ing.unit,
      costPerUnit: ing.cost,
      lineCost: qtyOk ? qtyInStorage * ing.cost : 0,
      conversionError: !qtyOk
    };
  }).filter(Boolean);
  const ingredientCost = lines.reduce((s,l)=>s+l.lineCost,0);
  return { lines, ingredientCost };
}
async function saveOrder(){
  const customer=document.getElementById('m-ocust').value.trim(); if(!customer) return alert('Customer name required.');
  const customerPhone=document.getElementById('m-ophone').value.trim();
  const customerEmail=document.getElementById('m-oemail').value.trim();
  const customerAddress=document.getElementById('m-oaddr').value.trim();
  const recipeId=parseInt(document.getElementById('m-orec').value);
  const qty=parseInt(document.getElementById('m-oqty').value)||1;
  const r=getRecipe(recipeId);
  if (!r) return alert('Pick a recipe.');
  // Pull the editable cost fields
  const sellPricePerUnit = parseFloat(document.getElementById('m-osell').value) || 0;
  const labour           = parseFloat(document.getElementById('m-olabour').value) || 0;
  const electricity      = parseFloat(document.getElementById('m-oelec').value) || 0;
  const packingPerUnit   = parseFloat(document.getElementById('m-opack').value) || 0;
  const transportCost    = parseFloat(document.getElementById('m-otrans').value) || 0;
  const snap = buildOrderSnapshot(r, qty);
  const cakeCost = snap.ingredientCost + labour + electricity + (packingPerUnit * qty);
  const id = S.nextOrderId++;
  const order = {
    id,
    customer, customerPhone, customerEmail, customerAddress,
    recipeId, qty,
    note: document.getElementById('m-onote').value,
    dueDate: document.getElementById('m-odate').value,
    status: 'pending',
    sellPricePerUnit,
    sellPriceSnapshot: sellPricePerUnit,  // alias retained for any in-memory consumers
    labour, electricity, packingPerUnit, transportCost,
    ingredientCost: snap.ingredientCost,
    cakeCost,
    ingredientSnapshot: snap.lines,
    completedDate: ''
  };
  S.orders.push(order);
  const revenue = sellPricePerUnit * qty;
  const profit  = revenue - cakeCost;
  logAction('order','Order placed', `${customer} — ${r.name} × ${qty}, sell ${fmtMoney(revenue)}, cake cost ${fmtMoney(cakeCost)}, profit ${fmtMoney(profit)}`, 'order', id);
  closeModal(); renderOrders();
  await persistWrite('addOrder', order, activityLog[0]);
}
async function cycleStatus(id){
  const o=S.orders.find(x=>x.id===id); if(!o) return;
  const r=getRecipe(o.recipeId);
  const movingToDone = o.status === 'pending';
  // Build stock deltas: subtract on Done, add back on undo
  const snapshot = Array.isArray(o.ingredientSnapshot) ? o.ingredientSnapshot : [];
  const sign = movingToDone ? -1 : 1;
  const stockDeltas = snapshot.map(line => ({ ingId: line.ingId, delta: sign * (parseFloat(line.qtyInStorage) || 0) }));
  // Warn if marking Done would push any stock negative
  if (movingToDone) {
    const shortages = [];
    snapshot.forEach(line => {
      const ing = getIng(line.ingId);
      if (!ing) return;
      const need = parseFloat(line.qtyInStorage) || 0;
      if (parseFloat(ing.stock) < need) {
        shortages.push(`${ing.name}: have ${ing.stock} ${ing.storageUnit||ing.unit}, need ${need}`);
      }
    });
    if (shortages.length) {
      const proceed = confirm(`Insufficient stock to mark this order Done:\n\n${shortages.join('\n')}\n\nMark Done anyway? (Stock will go negative.)`);
      if (!proceed) return;
    }
  }
  // Apply deltas locally
  stockDeltas.forEach(d => {
    const ing = getIng(d.ingId);
    if (ing) ing.stock = Math.round((parseFloat(ing.stock) + d.delta) * 1000) / 1000;
  });
  o.status = movingToDone ? 'done' : 'pending';
  o.completedDate = movingToDone ? today() : '';
  logAction('order',`Order marked ${o.status}`,`${o.customer} — ${r?r.name:''} × ${o.qty}`,'order',o.id);
  renderOrders();
  await persistWrite('updateOrderStatus', { id: o.id, status: o.status, completedDate: o.completedDate, stockDeltas }, activityLog[0]);
}
async function deleteOrder(id){
  const o=S.orders.find(x=>x.id===id);

  S.orders=S.orders.filter(x=>x.id!==id); renderOrders();
  await persistWrite('deleteOrder', {id}, activityLog[0]);
}
function showOrderDetail(id){
  const o = S.orders.find(x => x.id === id); if (!o) return;

  const elec      = o.electricity != null ? parseFloat(o.electricity)  : null;
  const packPerU  = o.packingPerUnit != null ? parseFloat(o.packingPerUnit) : null;
  const transport = parseFloat(o.transportCost) || 0;
  // cakeCost = snapshot stored value when available, else compute from parts
  const cakeCost  = parseFloat(o.cakeCost)
    || (ingCost + (labour ?? 0) + (elec ?? 0) + ((packPerU ?? 0) * o.qty));
  const profit    = sell - cakeCost;
  const margin    = sell > 0 ? Math.round(profit / sell * 100) : 0;
  const invoiceTotal = sell + transport;
  const lines = Array.isArray(o.ingredientSnapshot) ? o.ingredientSnapshot : [];
  const marginColor = margin>=40?'var(--success)':margin>=20?'var(--warning)':'var(--danger)';
  const isLegacy = labour == null && elec == null && packPerU == null;
  showModal(`<div class="modal-title">Order #${o.id} — ${esc(o.customer)}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
      ${o.customerPhone ? `📞 ${esc(o.customerPhone)} &nbsp;·&nbsp; ` : ''}

    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Due</span><span>${fmtDate(o.dueDate)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Status</span><span class="badge ${o.status==='done'?'badge-ok':'badge-warn'}">${esc(o.status)}</span></div>
    ${o.completedDate ? `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Completed</span><span>${fmtDate(o.completedDate)}</span></div>` : ''}
    ${o.note ? `<div style="font-size:12px;color:var(--text-secondary);margin:8px 0;padding:8px;background:#FAF7F2;border-radius:6px">📝 ${esc(o.note)}</div>` : ''}
    <div class="divider"></div>
    <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Ingredients (snapshot at order time)</div>
    ${lines.length === 0
      ? `<div style="color:var(--text-muted);font-size:12px">No ingredient snapshot — live recipe cost: ${fmtMoney(r ? calcIngCost(r) * o.qty : 0)}</div>`
      : lines.map(l => `<div class="history-row"><span>${esc(l.name)} — ${l.qtyEntered} ${esc(l.unit)}</span><span style="font-weight:500">${fmtMoney(l.lineCost)}</span></div>`).join('')}
    ${isLegacy ? '' : `
    <div class="divider"></div>
    <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Batch costs</div>
    <div class="history-row"><span>Labour</span><span style="font-weight:500">${fmtMoney(labour)}</span></div>
    <div class="history-row"><span>Electricity</span><span style="font-weight:500">${fmtMoney(elec)}</span></div>
    <div class="history-row"><span>Packing (${o.qty} × ${fmtMoney(packPerU)})</span><span style="font-weight:500">${fmtMoney((packPerU||0) * o.qty)}</span></div>
    `}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;font-weight:600"><span>Total cake cost</span><span>${fmtMoney(cakeCost)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--success)"><span>Sell (${o.qty} × ${fmtMoney(sellPerU)})</span><span style="font-weight:600">${fmtMoney(sell)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:14px;padding:4px 0;font-weight:600"><span>Cake profit</span><span style="color:${marginColor}">${fmtMoney(profit)} (${margin}%)</span></div>
    <div style="border-top:1px dashed var(--border-light);margin:8px 0 4px"></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--text-muted)"><span>Transport (billed separately)</span><span>${fmtMoney(transport)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;font-weight:600"><span>Invoice total</span><span>${fmtMoney(invoiceTotal)}</span></div>
    <div style="margin-top:1rem"><button class="btn" onclick="closeModal()">Close</button></div>`);
}


// ─── BOOT ─────────────────────────────────────────────────────
async function init() {
  showDbBanner();
  if (DB_ENABLED) {
    showLoading('Loading your data...');
    // load() in the backend self-migrates the schema before reading,
    // so a single call gets us both up-to-date columns and the data.
    const result = await dbGet('load');
    if (result && result.ok) {
      S.ingredients = result.ingredients || [];
      S.recipes = result.recipes || [];
      S.orders = result.orders || [];
      S.shoppingTrips = result.shoppingTrips || [];
      S.priceHistory = result.priceHistory || {};
      activityLog.length = 0;
      (result.activityLog || []).forEach(l => activityLog.push(l));
      // Next IDs walk past any existing rows
      S.nextIngId    = S.ingredients.length    ? Math.max(...S.ingredients.map(i=>i.id))    + 1 : 1;
      S.nextRecipeId = S.recipes.length        ? Math.max(...S.recipes.map(r=>r.id))        + 1 : 1;
      S.nextOrderId  = S.orders.length         ? Math.max(...S.orders.map(o=>o.id))         + 1 : 1;
      S.nextTripId   = S.shoppingTrips.length  ? Math.max(...S.shoppingTrips.map(t=>t.id))  + 1 : 1;
    } else {
      const err = (result && result.error) || 'unknown error';
      showToast('Could not load data — ' + err, 'error');
    }
    hideLoading();
  }
  renderDashboard();
}
init();
