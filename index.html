<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CakeUz — by Asanka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --cream:#F9F9FB;--warm-white:#FFFFFF;--caramel:#F5A623;--caramel-light:#F7BC55;
  --caramel-dark:#D4881A;--chocolate:#2D3E50;--chocolate-mid:#3D5166;--mocha:#5A7189;
  --blush:#FEF3D8;--text-primary:#1A2A38;--text-secondary:#4A6076;--text-muted:#8A9FAF;
  --border:#D8E3EC;--border-light:#EBF1F6;--success:#3A8A5A;--warning:#E09020;
  --danger:#C04040;--shadow-sm:0 1px 3px rgba(45,62,80,0.08);
  --shadow-md:0 4px 16px rgba(45,62,80,0.1);--shadow-lg:0 12px 40px rgba(45,62,80,0.15);
  --radius:12px;--radius-sm:8px;--radius-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh}
.topbar{background:#FFFFFF;border-bottom:2px solid var(--caramel);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;background:var(--caramel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-family:'Playfair Display',serif;font-size:22px;color:#FDF8F2;font-weight:600}
.brand-sub{font-size:11px;color:var(--mocha);letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
.topbar-date{font-size:12px;color:var(--text-secondary)}
.nav-wrap{background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;gap:0;overflow-x:auto}
.nav-btn{padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.nav-btn:hover{color:var(--chocolate)}
.nav-btn.active{color:var(--caramel-dark);border-bottom-color:var(--caramel);font-weight:600}
.main{padding:2rem;max-width:1200px;margin:0 auto}
.card{background:var(--warm-white);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--chocolate)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:var(--warm-white);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
.metric-label{font-size:10px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.metric-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--chocolate)}
.metric-val.green{color:var(--success)}.metric-val.amber{color:var(--warning)}.metric-val.red{color:var(--danger)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:10px 10px;border-bottom:1px solid var(--border-light);color:var(--text-primary);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(200,132,58,0.03)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:#EBF5EB;color:var(--success)}.badge-warn{background:#FEF3E2;color:var(--warning)}
.badge-danger{background:#FDEAEA;color:var(--danger)}.badge-info{background:#EBF0FA;color:#4A6FA5}
.btn{padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text-primary);transition:all 0.15s}
.btn:hover{background:var(--blush);border-color:var(--caramel-light)}
.btn-primary{background:var(--caramel);color:#FFF;border-color:var(--caramel)}
.btn-primary:hover{background:var(--caramel-dark);border-color:var(--caramel-dark)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-danger{border-color:#E0BBBB;color:var(--danger)}.btn-danger:hover{background:#FDEAEA;border-color:var(--danger)}
.btn-chocolate{background:var(--chocolate);color:#FDF8F2;border-color:var(--chocolate)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--warm-white);color:var(--text-primary);transition:border-color 0.15s}
input:focus,select:focus{outline:none;border-color:var(--caramel)}
.modal-overlay{position:fixed;inset:0;background:rgba(42,21,6,0.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--warm-white);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:modalIn 0.2s ease}
@keyframes modalIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--chocolate);margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border-light)}
.section{display:none}.section.active{display:block}
.ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ing-row select{flex:2}.ing-row input{flex:1}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;background:var(--cream);transition:all 0.2s}
.upload-zone:hover{border-color:var(--caramel-light);background:var(--blush)}
.receipt-thumb{width:56px;height:56px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer}
.price-up{color:var(--danger);font-size:11px;font-weight:600}.price-down{color:var(--success);font-size:11px;font-weight:600}
.profit-bar-wrap{background:var(--blush);border-radius:4px;height:8px;overflow:hidden;margin-top:5px}
.profit-bar{height:8px;border-radius:4px;transition:width 0.5s ease}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--caramel);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.empty-state{text-align:center;padding:2rem;color:var(--text-muted);font-size:13px}
.trip-card{border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem;margin-bottom:10px;background:var(--cream)}
.hero-stat{background:linear-gradient(135deg,#2D3E50 0%,#3D5166 100%);border-radius:var(--radius-lg);padding:1.5rem 2rem;color:#FDF8F2;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-md)}
.hero-stat-main{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#FDF8F2}
.hero-stat-label{font-size:12px;color:var(--mocha);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:4px}
.hero-stat-sub{font-size:12px;color:var(--mocha);margin-top:4px}
.cake-emoji{font-size:48px;opacity:0.6}
.log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px;align-items:flex-start}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.log-time{font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:130px}
.log-action{font-weight:600;color:var(--text-primary)}
.log-detail{color:var(--text-secondary);font-size:12px;margin-top:2px}
.log-add{background:#5A8A5A}.log-edit{background:#C8843A}.log-delete{background:#B85555}.log-order{background:#4A6FA5}.log-shop{background:#8B5E3C}
</style>
</head>

<script>

// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS API — paste your deployed Web App URL below
// ═══════════════════════════════════════════════════════
const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const DB_ENABLED = API_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

async function dbGet(action) {
  if (!DB_ENABLED) return null;
  try {
    const res = await fetch(`${API_URL}?action=${action}`);
    return await res.json();
  } catch(e) { console.error('DB GET error:', e); return null; }
}

async function dbPost(action, data) {
  if (!DB_ENABLED) return null;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action, data })
    });
    return await res.json();
  } catch(e) { console.error('DB POST error:', e); return null; }
}

// Banner shown when not connected
function showDbBanner() {
  if (DB_ENABLED) return;
  const banner = document.createElement('div');
  banner.id = 'db-banner';
  banner.innerHTML = `<span>⚠️ Running in demo mode — data will reset on refresh. <a href="https://github.com/yourusername/cakeuz#setup" target="_blank" style="color:var(--caramel);font-weight:600">Connect Google Sheets →</a></span>`;
  banner.style.cssText = 'background:#FEF3D8;border-bottom:1px solid var(--caramel-light);padding:8px 2rem;font-size:12px;color:var(--text-secondary);text-align:center;';
  document.querySelector('.nav-wrap').after(banner);
}

// Loading overlay
function showLoading(msg) {
  let el = document.getElementById('db-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'db-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(249,249,251,0.85);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';
    document.body.appendChild(el);
  }
  el.innerHTML = `<div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--caramel);border-radius:50%;animation:spin 0.7s linear infinite"></div><div style="font-size:14px;color:var(--text-secondary);font-family:'DM Sans',sans-serif">${msg}</div>`;
  el.style.display = 'flex';
}
function hideLoading() {
  const el = document.getElementById('db-loading');
  if (el) el.style.display = 'none';
}


// ─── CURRENCY ────────────────────────────────────────────────────────────────
const CURRENCY = 'SGD';
const fmtMoney = n => CURRENCY + ' ' + (Math.round(n*100)/100).toLocaleString('en-SG',{minimumFractionDigits:2,maximumFractionDigits:2});

// ─── ACTIVITY LOG ────────────────────────────────────────────────────────────
const activityLog = [];

const fmtPct = n => Math.round(n)+"%";

function renderPricing(){
  document.getElementById('tab-pricing').innerHTML=`
    <div class="two-col">
      <div class="card">
        <div class="card-head"><span class="card-title">Pricing Calculator</span></div>
        <div class="form-group" style="margin-bottom:12px"><label>Recipe</label><select id="pricing-recipe" onchange="calcPricing()">${recipeOpts()}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Overhead %</label><input type="number" id="pricing-overhead" value="20" onchange="calcPricing()"></div>
          <div class="form-group"><label>Labour (${CURRENCY})</label><input type="number" id="pricing-labour" value="8" onchange="calcPricing()"></div>
        </div>
        <div class="form-group" style="margin-bottom:12px"><label>Target margin %</label><input type="number" id="pricing-margin" value="40" onchange="calcPricing()"></div>
      </div>
      <div id="pricing-results"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Recipe Margins at a Glance</span></div>
      <div>${S.recipes.map(r=>{
        const cost=calcIngCost(r);
        const m=r.sellPrice>0?Math.max(0,Math.round((r.sellPrice-cost)/r.sellPrice*100)):0;
        return `<div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span style="font-weight:500">${r.name}</span>
            <span style="font-weight:600;color:${m>=40?'var(--success)':'var(--warning)'}">${m}% &nbsp;<span style="color:var(--text-muted);font-weight:400">${fmtMoney(r.sellPrice)}</span></span>
          </div>
          <div class="profit-bar-wrap"><div class="profit-bar" style="width:${Math.min(100,m)}%;background:${m>=40?'var(--success)':'var(--warning)'}"></div></div>
        </div>`;
      }).join('')}</div>
    </div>`;
  calcPricing();
}

function calcPricing(){
  const r=getRecipe(parseInt(document.getElementById('pricing-recipe').value));
  if(!r) return;
  const ic=calcIngCost(r),ov=parseFloat(document.getElementById('pricing-overhead').value)||0;
  const lb=parseFloat(document.getElementById('pricing-labour').value)||0;
  const tm=parseFloat(document.getElementById('pricing-margin').value)||40;
  const ovc=ic*(ov/100),tc=ic+ovc+lb,suggested=tc/(1-tm/100);
  const actual=r.sellPrice>0?((r.sellPrice-tc)/r.sellPrice*100):0;
  document.getElementById('pricing-results').innerHTML=`
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><span class="card-title">Cost Breakdown</span></div>
      ${[['Ingredient cost',fmtMoney(ic),''],['Overhead',fmtMoney(ovc),''],['Labour',fmtMoney(lb),''],
        ['Total cost',fmtMoney(tc),'font-weight:600'],
        ['Suggested price ('+fmtPct(tm)+' margin)',fmtMoney(suggested),'font-weight:600;color:var(--success)'],
        ['Current sell price',fmtMoney(r.sellPrice),''],
        ['Actual margin',fmtPct(actual),`font-weight:600;color:${actual>=40?'var(--success)':'var(--danger)'}`]]
        .map(([k,v,s])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px"><span>${k}</span><span style="${s}">${v}</span></div>`).join('')}
    </div>`;
}

function saveIngredient(){
  const name=document.getElementById('m-name').value.trim(); if(!name) return alert('Please enter a name.');
  const id=S.nextIngId++;
  const cost=parseFloat(document.getElementById('m-cost').value)||0;
  const unit=document.getElementById('m-unit').value;
  const stock=parseFloat(document.getElementById('m-stock').value)||0;
  S.ingredients.push({id,name,stock,unit,cost});
  S.priceHistory[id]=[{date:today(),cost}];
  logAction('add','Ingredient added',`${name} — ${fmtMoney(cost)}/${unit}, stock: ${stock} ${unit}`);
  dbPost('addIngredient', {id, name, stock, unit, cost, date:today()});
  dbPost('addLog', activityLog[0]);
  closeModal(); renderInventory();
}

function showEditIngredient(id){
  const i=getIng(id);

    <div class="form-row">
      <div class="form-group"><label>Stock qty</label><input id="m-stock" type="number" value="${i.stock}" step="0.1"></div>
      <div class="form-group"><label>Unit</label><select id="m-unit"><option ${i.unit==='kg'?'selected':''}>kg</option><option ${i.unit==='g'?'selected':''}>g</option><option ${i.unit==='mg'?'selected':''}>mg</option><option ${i.unit==='lb'?'selected':''}>lb</option><option ${i.unit==='oz'?'selected':''}>oz</option><option ${i.unit==='L'?'selected':''}>L</option><option ${i.unit==='ml'?'selected':''}>ml</option><option ${i.unit==='fl oz'?'selected':''}>fl oz</option><option ${i.unit==='tsp'?'selected':''}>tsp</option><option ${i.unit==='tbsp'?'selected':''}>tbsp</option><option ${i.unit==='cup'?'selected':''}>cup</option><option ${i.unit==='pcs'?'selected':''}>pcs</option></select></div>
    </div>
    <div class="form-row"><div class="form-group"><label>Cost per unit (${CURRENCY})</label><input id="m-cost" type="number" value="${i.cost}" step="0.01"></div></div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn btn-primary" onclick="saveEditIngredient(${id})">Save changes</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
}
function saveEditIngredient(id){
  const i=getIng(id);
  const nc=parseFloat(document.getElementById('m-cost').value)||0;
  const oldCost=i.cost, oldStock=i.stock;
  i.name=document.getElementById('m-name').value.trim();
  i.stock=parseFloat(document.getElementById('m-stock').value)||0;
  i.unit=document.getElementById('m-unit').value;
  let detail=`${i.name}`;
  if(nc!==oldCost){ i.cost=nc; if(!S.priceHistory[id])S.priceHistory[id]=[]; S.priceHistory[id].push({date:today(),cost:nc}); detail+=` — price: ${fmtMoney(oldCost)} → ${fmtMoney(nc)}`; }
  if(i.stock!==oldStock) detail+=` — stock: ${oldStock} → ${i.stock} ${i.unit}`;
  logAction('edit','Ingredient updated',detail);
  dbPost('editIngredient', {id:i.id, name:i.name, stock:i.stock, unit:i.unit, cost:i.cost, priceChanged:nc!==oldCost, date:today()});
  dbPost('addLog', activityLog[0]);
  closeModal(); renderInventory();
}
function deleteIng(id){
  const i=getIng(id);
  logAction('delete','Ingredient deleted',i?i.name:'unknown');
  dbPost('deleteIngredient', {id});
  dbPost('addLog', activityLog[0]);
  S.ingredients=S.ingredients.filter(x=>x.id!==id); renderInventory();
}

function showPriceHistory(id){
  const i=getIng(id);
  const hist=S.priceHistory[id]||[];
  showModal(`<div class="modal-title">Price History — ${i.name}</div>
    <canvas id="ph-chart" height="140" style="margin-bottom:1rem"></canvas>
    <div style="max-height:220px;overflow-y:auto">
      ${hist.slice().reverse().map((h,idx,arr)=>{
        const prev=arr[idx+1];
        const chg=prev?((h.cost-prev.cost)/prev.cost*100):null;
        return `<div class="history-row">
          <span>${fmtDate(h.date)}</span>
          <span style="font-weight:600">${fmtMoney(h.cost)}</span>
          ${chg!==null?`<span class="${chg>0?'price-up':'price-down'}">${chg>0?'▲':'▼'}${Math.abs(chg).toFixed(1)}%</span>`:'<span style="color:var(--text-muted);font-size:11px">baseline</span>'}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:1rem"><button class="btn" onclick="closeModal()">Close</button></div>`);
  setTimeout(()=>{
    const ctx=document.getElementById('ph-chart'); if(!ctx) return;
    if(chartInstance) chartInstance.destroy();
    chartInstance=new Chart(ctx,{type:'line',data:{labels:hist.map(h=>fmtDate(h.date)),datasets:[{label:CURRENCY,data:hist.map(h=>h.cost),borderColor:'#F5A623',backgroundColor:'rgba(245,166,35,0.1)',tension:0.35,pointRadius:5,pointBackgroundColor:'#F5A623',borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>CURRENCY+' '+v.toFixed(2),font:{size:10}}},x:{ticks:{font:{size:10}}}}}});
  },80);
}

// Shopping
let receiptB64=null,receiptMime=null;
function showAddTrip(){
  receiptB64=null; receiptMime=null;
  showModal(`<div class="modal-title">New Shopping Trip</div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input id="m-tdate" type="date" value="${today()}"></div>
      <div class="form-group"><label>Shop / Market</label><input id="m-tshop" placeholder="e.g. FairPrice"></div>
    </div>
    <div style="margin:12px 0">
      <label style="display:block;margin-bottom:6px">Receipt Photo</label>
      <div class="upload-zone" onclick="document.getElementById('receipt-input').click()">
        <input type="file" id="receipt-input" accept="image/*" style="display:none" onchange="handleReceiptUpload(event)">
        <div id="receipt-preview" style="color:var(--text-muted);font-size:13px">📷 Tap to upload receipt photo</div>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm" id="ai-btn" style="display:none" onclick="scanWithAI()">✨ Scan with AI</button>

      </div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Items Purchased</div>
    <div id="trip-rows"></div>
    <button class="btn btn-sm" style="margin-bottom:12px" onclick="addTripRow()">+ Add item</button>

function addTripRow(){
  const div=document.createElement('div'); div.className='ing-row';
  div.innerHTML=`<select style="flex:2">${ingOpts()}</select><input type="number" placeholder="Qty" step="0.01" value="1" style="width:65px"><input type="number" placeholder="Unit price" step="0.01" value="0" style="width:110px"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('trip-rows').appendChild(div);
}
function handleReceiptUpload(e){
  const file=e.target.files[0]; if(!file) return;
  receiptMime=file.type;
  const reader=new FileReader();
  reader.onload=ev=>{
    receiptB64=ev.target.result.split(',')[1];
    document.getElementById('receipt-preview').innerHTML=`<img src="${ev.target.result}" style="max-height:100px;border-radius:8px"><br><span style="font-size:11px;color:var(--text-muted)">${file.name}</span>`;
    document.getElementById('ai-btn').style.display='inline-block';
  };
  reader.readAsDataURL(file);
}
async function scanWithAI(){
  if(!receiptB64) return;
  const btn=document.getElementById('ai-btn'),status=document.getElementById('ai-status');
  btn.disabled=true; status.innerHTML=`<span class="spinner"></span> Reading receipt...`;
  const ingList=S.ingredients.map(i=>`${i.id}: ${i.name} (${i.unit})`).join('\n');
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:receiptMime,data:receiptB64}},{type:"text",text:`Read this grocery receipt. Currency is SGD.\nOur ingredients:\n${ingList}\nMatch receipt items to ingredients. Return ONLY valid JSON array, no markdown:\n[{"ingId":1,"qty":2,"unitPrice":1.20}]\nIf no match, return [].`}]}]})});
    const data=await res.json();
    const text=data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    const items=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(!Array.isArray(items)||items.length===0){status.innerHTML='<span style="color:var(--warning)">No matches — add items manually.</span>';btn.disabled=false;return;}
    document.getElementById('trip-rows').innerHTML='';
    items.forEach(it=>{
      const div=document.createElement('div');div.className='ing-row';
      div.innerHTML=`<select style="flex:2">${ingOpts(it.ingId)}</select><input type="number" value="${it.qty}" step="0.01" style="width:65px"><input type="number" value="${it.unitPrice}" step="0.01" style="width:110px"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>`;
      document.getElementById('trip-rows').appendChild(div);
    });
    status.innerHTML=`<span style="color:var(--success)">✓ Found ${items.length} item${items.length!==1?'s':''}. Review below.</span>`;
  }catch(err){status.innerHTML=`<span style="color:var(--danger)">Error: ${err.message}</span>`;}
  btn.disabled=false;
}
function saveTrip(){
  const date=document.getElementById('m-tdate').value,shop=document.getElementById('m-tshop').value;
  const rows=document.querySelectorAll('#trip-rows .ing-row');
  const items=[];let total=0;
  rows.forEach(row=>{
    const sel=row.querySelector('select'),ins=row.querySelectorAll('input[type=number]');
    if(!sel||ins.length<2) return;
    const ingId=parseInt(sel.value),qty=parseFloat(ins[0].value)||0,up=parseFloat(ins[1].value)||0;
    items.push({ingId,qty,unitPrice:up});total+=qty*up;
    const ing=getIng(ingId);
    if(ing){
      if(up>0&&up!==ing.cost){ ing.cost=up; if(!S.priceHistory[ingId])S.priceHistory[ingId]=[]; const last=S.priceHistory[ingId].slice(-1)[0]; if(!last||last.cost!==up)S.priceHistory[ingId].push({date,cost:up}); }
      ing.stock=parseFloat((ing.stock+qty).toFixed(3));
    }
  });
  const tripId=S.nextTripId++;
  const receiptImg = receiptB64?`data:${receiptMime};base64,${receiptB64}`:null;
  S.shoppingTrips.push({id:tripId,date,shop,items,total,receiptImg});
  logAction('shop','Shopping trip saved',`${shop||'Unnamed shop'} — ${items.length} items, total ${fmtMoney(total)}`);
  dbPost('addShoppingTrip', {date, shop, total, items, receiptImg: receiptImg||''});
  dbPost('addLog', activityLog[0]);
  closeModal(); renderShopping();
}
function deleteTrip(id){
  const t=S.shoppingTrips.find(x=>x.id===id);
  logAction('delete','Shopping trip deleted',t?`${fmtDate(t.date)} — ${t.shop}`:'');
  dbPost('deleteShoppingTrip', {id});
  dbPost('addLog', activityLog[0]);
  S.shoppingTrips=S.shoppingTrips.filter(x=>x.id!==id); renderShopping();
}
function viewReceiptFull(id){
  const t=S.shoppingTrips.find(x=>x.id===id); if(!t||!t.receiptImg) return;
  showModal(`<div class="modal-title">Receipt — ${fmtDate(t.date)}, ${t.shop}</div><img src="${t.receiptImg}" style="width:100%;border-radius:var(--radius);margin-bottom:1rem"><button class="btn" onclick="closeModal()">Close</button>`);
}

function saveRecipe(){
  const name=document.getElementById('m-rname').value.trim(); if(!name) return;
  const ings=[];
  document.querySelectorAll('#m-ings .ing-row').forEach(row=>{const s=row.querySelector('select'),i=row.querySelector('input[type=number]');if(s&&i)ings.push({ingId:parseInt(s.value),qty:parseFloat(i.value)||0});});
  const sellPrice=parseFloat(document.getElementById('m-rprice').value)||0;
  S.recipes.push({id:S.nextRecipeId++,name,yield:document.getElementById('m-ryield').value||'1 unit',sellPrice,ingredients:ings});
  logAction('add','Recipe added',`${name} — sell price ${fmtMoney(sellPrice)}, ${ings.length} ingredients`);
  const newRec = S.recipes[S.recipes.length-1];
  dbPost('addRecipe', {name:newRec.name, yield:newRec.yield, sellPrice:newRec.sellPrice, ingredients:newRec.ingredients});
  dbPost('addLog', activityLog[0]);
  closeModal(); renderRecipes();
}

function deleteRecipe(id){

  showModal(`<div class="modal-title">New Order</div>

    <div class="form-row">
      <div class="form-group"><label>Recipe</label><select id="m-orec">${recipeOpts()}</select></div>
      <div class="form-group"><label>Quantity</label><input id="m-oqty" type="number" value="1" min="1"></div>

    <div class="form-row"><div class="form-group"><label>Note (optional)</label><input id="m-onote" placeholder="Special requests..."></div></div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn btn-primary" onclick="saveOrder()">Place order</button>
      <button class="btn" onclick="closeModal()">Cancel</button>

function saveOrder(){
  const customer=document.getElementById('m-ocust').value.trim(); if(!customer) return;
  const recipeId=parseInt(document.getElementById('m-orec').value);
  const qty=parseInt(document.getElementById('m-oqty').value)||1;
  const r=getRecipe(recipeId);
  S.orders.push({id:S.nextOrderId++,customer,recipeId,qty,note:document.getElementById('m-onote').value,dueDate:document.getElementById('m-odate').value,status:'pending'});
  logAction('order','Order placed',`${customer} — ${r?r.name:''} × ${qty}, total ${fmtMoney(r?r.sellPrice*qty:0)}`);
  const newOrd = S.orders[S.orders.length-1];
  dbPost('addOrder', {customer:newOrd.customer, recipeId:newOrd.recipeId, qty:newOrd.qty, note:newOrd.note, dueDate:newOrd.dueDate});
  dbPost('addLog', activityLog[0]);
  closeModal(); renderOrders();
}
function cycleStatus(id){
  const o=S.orders.find(x=>x.id===id); if(!o) return;
  const r=getRecipe(o.recipeId);
  const prev=o.status; o.status=o.status==='pending'?'done':'pending';
  logAction('order',`Order marked ${o.status}`,`${o.customer} — ${r?r.name:''} × ${o.qty}`);
  dbPost('updateOrderStatus', {id:o.id, status:o.status});
  dbPost('addLog', activityLog[0]);
  renderOrders();
}
function deleteOrder(id){
  const o=S.orders.find(x=>x.id===id);
  logAction('delete','Order deleted',o?`${o.customer} — ${fmtDate(o.dueDate)}`:'');
  dbPost('deleteOrder', {id});
  dbPost('addLog', activityLog[0]);
  S.orders=S.orders.filter(x=>x.id!==id); renderOrders();
}


// ─── BOOT ─────────────────────────────────────────────────────
async function init() {
  showDbBanner();
  if (DB_ENABLED) {
    showLoading('Loading your data...');
    const result = await dbGet('load');
    if (result && result.ok) {
      // Restore state from Google Sheets
      if (result.ingredients.length) S.ingredients = result.ingredients;
      if (result.recipes.length) S.recipes = result.recipes;
      if (result.orders.length) S.orders = result.orders;
      if (result.shoppingTrips.length) S.shoppingTrips = result.shoppingTrips;
      if (Object.keys(result.priceHistory).length) S.priceHistory = result.priceHistory;
      if (result.activityLog.length) {
        activityLog.length = 0;
        result.activityLog.forEach(l => activityLog.push(l));
      }
      // Update next IDs
      if (S.ingredients.length) S.nextIngId = Math.max(...S.ingredients.map(i=>i.id)) + 1;
      if (S.recipes.length) S.nextRecipeId = Math.max(...S.recipes.map(r=>r.id)) + 1;
      if (S.orders.length) S.nextOrderId = Math.max(...S.orders.map(o=>o.id)) + 1;
      if (S.shoppingTrips.length) S.nextTripId = Math.max(...S.shoppingTrips.map(t=>t.id)) + 1;
    } else {
      console.warn('Could not load from Sheets — using demo data');
    }
    hideLoading();
  }
  renderDashboard();
}
init();

</script>
