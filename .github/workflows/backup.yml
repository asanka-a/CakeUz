name: Daily Supabase backup

on:
  schedule:
    # 15:15 UTC = 23:15 Asia/Singapore (UTC+8). GitHub may delay free-tier crons
    # by up to ~30 min during load, but for a once-a-day backup that's fine.
    - cron: '15 15 * * *'
  workflow_dispatch: {}  # also runnable manually from Actions tab

permissions:
  contents: write

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snapshot Supabase tables to backups/
        env:
          SUPABASE_URL: https://puwdbrsvqbxeanoewycy.supabase.co
          # Anon key is public by design; the same value lives in index.html
          SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1d2RicnN2cWJ4ZWFub2V3eWN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDY2ODIsImV4cCI6MjA5NDEyMjY4Mn0.Hqub2GM1iZuey5qzd2hOlP1G4QV98sigfgshd7p8g1k
          TZ: Asia/Singapore
        run: |
          set -e
          mkdir -p backups
          STAMP=$(date +'%Y-%m-%d')
          OUT="backups/snapshot_${STAMP}.json"

          python3 - "$OUT" <<'PY'
          import urllib.request, json, os, sys
          tables = [
              'ingredients','price_history','recipes','recipe_ingredients',
              'orders','shopping_trips','shopping_items','activity_log'
          ]
          out = {}
          for t in tables:
              url = f"{os.environ['SUPABASE_URL']}/rest/v1/{t}?select=*&limit=100000"
              req = urllib.request.Request(url, headers={
                  'apikey': os.environ['SUPABASE_KEY'],
                  'Authorization': 'Bearer ' + os.environ['SUPABASE_KEY']
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  out[t] = json.loads(r.read())
              print(f"  {t}: {len(out[t])} rows", file=sys.stderr)
          with open(sys.argv[1], 'w', encoding='utf-8') as f:
              json.dump({'taken_at': os.environ.get('GITHUB_RUN_STARTED_AT') or '', 'tables': out},
                        f, indent=2, default=str, ensure_ascii=False)
          PY

          echo "Wrote $OUT ($(wc -c < "$OUT") bytes)"

      - name: Commit backup
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes (same-day re-run); skipping commit"
          else
            git commit -m "Daily backup $(date +'%Y-%m-%d')"
            git push
          fi
